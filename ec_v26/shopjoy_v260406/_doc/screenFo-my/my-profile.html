<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>회원정보 수정 | MY</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#fafafa;color:#333;max-width:600px;margin:0 auto}
.fo-header{background:#fff;border-bottom:2px solid #f9a8d4;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.fo-header h1{font-size:16px;font-weight:700;color:#be185d}
.breadcrumb{font-size:11px;color:#aaa;padding:8px 20px;background:#f9fafb}
.breadcrumb span{color:#be185d;font-weight:600}
.section{background:#fff;margin:8px 0;padding:20px}
.section-title{font-size:14px;font-weight:700;color:#be185d;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #fce7f3}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#888;margin-bottom:5px;font-weight:500}
.field input,.field select{width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;font-size:14px;outline:none}
.field input:focus,.field select:focus{border-color:#f9a8d4}
.field input[readonly]{background:#f9fafb;color:#9ca3af}
.btn{display:inline-block;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;margin:2px}
.btn-primary{background:linear-gradient(135deg,#f9a8d4,#ec4899);color:#fff}
.btn-secondary{background:#f3f4f6;color:#555;border:1px solid #e5e7eb}
.btn-full{width:100%;margin-top:6px;padding:14px}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700}
.badge-gold{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.has-tip{cursor:help;border-bottom:1px dashed #f9a8d4}
.tip-box{display:none;position:fixed;z-index:9999;background:#1a1a2e;color:#fff;border-radius:8px;padding:10px 12px;font-size:11px;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.4);line-height:1.8;pointer-events:none}
.tip-box.show{display:block}
.tip-tbl{color:#f9a8d4;font-weight:700;font-size:12px}
.tip-col{color:#80cbc4;margin-bottom:3px}
.tip-comment{color:#e0e0e0}
.tip-code-grp{color:#ffcc80;margin-top:4px;font-size:10px}
.tip-codes{color:#b0bec5;font-size:10px;margin-top:2px}
.grade-box{background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:16px;padding:20px;margin-bottom:16px}
.grade-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.grade-nm{font-size:18px;font-weight:800;color:#92400e}
.grade-progress{height:8px;background:#fff;border-radius:4px;overflow:hidden;margin-bottom:8px}
.grade-progress-bar{height:100%;background:linear-gradient(90deg,#f59e0b,#d97706);border-radius:4px;width:65%}
.grade-desc{font-size:12px;color:#92400e}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:14px}
.info-label{color:#9ca3af;font-size:13px}
.info-value{font-weight:500}
.section-divider{height:8px;background:#f9fafb;margin:0}
.radio-group{display:flex;gap:16px;padding:6px 0}
.radio-group label{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px}
.radio-group input[type=radio]{accent-color:#ec4899}
</style>
</head>
<body>
<div class="fo-header">
  <h1>👤 회원정보 수정</h1>
  <a href="index.html" style="font-size:11px;color:#be185d;text-decoration:none">← 마이페이지</a>
</div>
<div class="breadcrumb">마이페이지 &gt; <span>회원정보 수정</span></div>

<!-- 등급 정보 -->
<div class="section">
  <div class="section-title">등급 정보</div>
  <div class="grade-box">
    <div class="grade-header">
      <div>
        <div style="font-size:12px;color:#92400e;margin-bottom:4px">현재 등급</div>
        <div class="grade-nm has-tip"
          data-table="mb_mem" data-col="grade_cd"
          data-tbl-cmt="회원 마스터" data-col-cmt="회원 등급 코드"
          data-code-grp="MEMBER_GRADE"
          data-codes="NORMAL:일반|SILVER:실버|GOLD:골드|VIP:VIP|VVIP:VVIP">
          🥇 골드 (GOLD)
        </div>
      </div>
      <span class="badge badge-gold">GOLD</span>
    </div>
    <div class="grade-progress">
      <div class="grade-progress-bar"></div>
    </div>
    <div class="grade-desc">
      다음 등급(VIP)까지 35,000원 더 구매하면 달성! (현재 누적: 465,000원)
    </div>
  </div>

  <div class="info-row">
    <span class="info-label">가입일</span>
    <span class="info-value has-tip"
      data-table="mb_mem" data-col="join_date"
      data-tbl-cmt="회원 마스터" data-col-cmt="회원 가입일시">
      2025-01-15
    </span>
  </div>
  <div class="info-row">
    <span class="info-label">총 주문금액</span>
    <span class="info-value has-tip"
      data-table="mb_mem" data-col="total_order_amt"
      data-tbl-cmt="회원 마스터" data-col-cmt="누적 구매금액 (등급 산정 기준)">
      465,000원
    </span>
  </div>
  <div class="info-row" style="border-bottom:none">
    <span class="info-label">보유 적립금</span>
    <span class="info-value" style="color:#be185d;font-weight:700">
      <span class="has-tip"
        data-table="mb_mem" data-col="cache_balance_amt"
        data-tbl-cmt="회원 마스터" data-col-cmt="현재 보유 적립금 잔액">
        12,500원
      </span>
    </span>
  </div>
</div>

<div class="section-divider"></div>

<!-- 회원 기본 정보 -->
<div class="section">
  <div class="section-title">기본 정보</div>

  <div class="field">
    <label class="has-tip"
      data-table="mb_mem" data-col="member_nm"
      data-tbl-cmt="회원 마스터" data-col-cmt="회원 이름">
      이름
    </label>
    <input type="text" value="홍길동">
  </div>

  <div class="field">
    <label class="has-tip"
      data-table="mb_mem" data-col="member_email"
      data-tbl-cmt="회원 마스터" data-col-cmt="회원 이메일 (로그인 ID, 변경 불가)">
      이메일 (로그인 ID)
    </label>
    <input type="email" value="hong@example.com" readonly>
    <div style="font-size:11px;color:#9ca3af;margin-top:4px">이메일은 변경할 수 없습니다.</div>
  </div>

  <div class="field">
    <label class="has-tip"
      data-table="mb_mem" data-col="member_phone"
      data-tbl-cmt="회원 마스터" data-col-cmt="회원 연락처 (휴대폰 번호)">
      연락처
    </label>
    <input type="tel" value="010-1234-5678">
  </div>

  <div class="field">
    <label class="has-tip"
      data-table="mb_mem" data-col="member_gender"
      data-tbl-cmt="회원 마스터" data-col-cmt="성별"
      data-code-grp="GENDER"
      data-codes="M:남성|F:여성|N:미지정">
      성별
    </label>
    <div class="radio-group">
      <label><input type="radio" name="gender" value="M"> 남성</label>
      <label><input type="radio" name="gender" value="F" checked> 여성</label>
      <label><input type="radio" name="gender" value="N"> 미지정</label>
    </div>
  </div>

  <div class="field">
    <label class="has-tip"
      data-table="mb_mem" data-col="birth_date"
      data-tbl-cmt="회원 마스터" data-col-cmt="생년월일 (YYYYMMDD)">
      생년월일
    </label>
    <input type="date" value="1990-06-15">
  </div>

  <button class="btn btn-primary btn-full">정보 저장</button>
</div>

<div class="section-divider"></div>

<!-- 비밀번호 변경 -->
<div class="section">
  <div class="section-title">비밀번호 변경</div>

  <div class="field">
    <label class="has-tip"
      data-table="mb_mem" data-col="member_pw"
      data-tbl-cmt="회원 마스터" data-col-cmt="회원 비밀번호 (BCrypt 해시 저장)">
      현재 비밀번호 *
    </label>
    <input type="password" placeholder="현재 비밀번호 입력">
  </div>

  <div class="field">
    <label>새 비밀번호 *</label>
    <input type="password" placeholder="8자 이상, 영문+숫자+특수문자">
  </div>

  <div class="field">
    <label>새 비밀번호 확인 *</label>
    <input type="password" placeholder="새 비밀번호 재입력">
  </div>

  <button class="btn btn-primary btn-full">비밀번호 변경</button>
</div>

<div class="section-divider"></div>

<!-- 회원 탈퇴 -->
<div class="section">
  <div style="text-align:center">
    <button class="btn btn-secondary" style="font-size:12px;color:#9ca3af">
      회원 탈퇴
    </button>
  </div>
</div>

<div class="tip-box" id="tipBox"></div>
<script>
const tb=document.getElementById('tipBox');
document.querySelectorAll('.has-tip').forEach(el=>{
  el.addEventListener('mouseenter',e=>{
    const d=el.dataset;
    let h=`<div class="tip-tbl">${d.table||''}</div><div class="tip-col">.${d.col||''}</div>`;
    if(d.tblCmt) h+=`<div class="tip-comment">📋 ${d.tblCmt}</div>`;
    if(d.colCmt) h+=`<div class="tip-comment">📌 ${d.colCmt}</div>`;
    if(d.codeGrp) h+=`<div class="tip-code-grp">코드그룹: ${d.codeGrp}</div>`;
    if(d.codes) h+=`<div class="tip-codes">${d.codes.split('|').map(c=>'· '+c).join('<br>')}</div>`;
    tb.innerHTML=h; tb.classList.add('show'); mv(e);
  });
  el.addEventListener('mousemove',mv);
  el.addEventListener('mouseleave',()=>tb.classList.remove('show'));
});
function mv(e){const x=e.clientX+14,y=e.clientY+14,w=tb.offsetWidth||260;tb.style.left=(x+w>window.innerWidth?x-w-28:x)+'px';tb.style.top=y+'px';}
</script>
</body>
</html>
