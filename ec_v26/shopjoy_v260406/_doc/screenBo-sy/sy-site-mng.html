<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>사이트 관리 — SY</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f5f5f5;color:#333}
.page-header{background:#fff;border-bottom:1px solid #eee;padding:16px 24px}
.breadcrumb{font-size:12px;color:#999;margin-bottom:4px}
.breadcrumb span{color:#f06292;font-weight:600}
h1{font-size:18px;font-weight:700}
.container{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.layout-row{display:grid;grid-template-columns:320px 1fr;gap:16px;align-items:start}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.section-title{font-size:14px;font-weight:700;color:#c2185b;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #fce4ec}
.btn{padding:7px 16px;border-radius:6px;font-size:13px;border:none;cursor:pointer;font-weight:500}
.btn-primary{background:linear-gradient(135deg,#f48fb1,#e91e63);color:#fff}
.btn-secondary{background:#f5f5f5;color:#555;border:1px solid #ddd}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}
.list-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.list-title{font-size:14px;font-weight:600}
.list-count{font-size:12px;color:#f06292;margin-left:6px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#fce4ec;color:#c2185b;font-weight:600;padding:10px 12px;text-align:center;border-bottom:2px solid #f48fb1;white-space:nowrap}
tbody td{padding:9px 12px;border-bottom:1px solid #f5f5f5;text-align:center;vertical-align:middle}
tbody tr:hover{background:#fff9fb}
tbody tr.selected{background:#fce4ec}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#e8f5e9;color:#2e7d32}
.badge-gray{background:#f5f5f5;color:#757575}
.badge-orange{background:#fff3e0;color:#e65100}
.badge-blue{background:#e3f2fd;color:#1565c0}
.actions{display:flex;gap:4px;justify-content:center}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:14px}
.form-grid.cols-3{grid-template-columns:repeat(3,1fr)}
.full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:11px;color:#888;font-weight:500}
.form-label.req::after{content:'*';color:#e91e63;margin-left:3px}
.form-control{border:1px solid #ddd;border-radius:6px;padding:7px 10px;font-size:13px;outline:none;width:100%}
textarea.form-control{resize:vertical;min-height:72px}
.form-hint{font-size:11px;color:#aaa;margin-top:2px}
.form-actions{display:flex;justify-content:flex-end;gap:8px;padding-top:14px;border-top:1px solid #f0f0f0;margin-top:16px}
.ddl-ref{background:#f8f9fa;border-radius:6px;padding:8px 12px;font-size:11px;color:#888;border-left:3px solid #f48fb1;margin-top:8px}
.ddl-ref strong{color:#c2185b}
.has-tip{cursor:help;border-bottom:1px dashed #f48fb1}
.tip-box{display:none;position:fixed;z-index:9999;background:#1a1a2e;color:#fff;border-radius:8px;padding:10px 12px;font-size:11px;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.4);line-height:1.8;pointer-events:none}
.tip-box.show{display:block}
.tip-tbl{color:#f48fb1;font-weight:700;font-size:12px}
.tip-col{color:#80cbc4;margin-bottom:3px}
.tip-comment{color:#e0e0e0}
.tip-code-grp{color:#ffcc80;margin-top:4px;font-size:10px}
.tip-codes{color:#b0bec5;font-size:10px;margin-top:2px}
</style>
</head>
<body>
<div class="page-header">
  <div class="breadcrumb">관리자 &gt; 시스템관리 &gt; <span>사이트 관리</span></div>
  <h1>🌐 사이트 관리</h1>
</div>
<div class="container">
  <div class="layout-row">

    <!-- 목록 -->
    <div class="card">
      <div class="list-toolbar">
        <div><span class="list-title">사이트 목록</span><span class="list-count">총 3건</span></div>
        <button class="btn btn-primary btn-sm">+ 신규</button>
      </div>
      <table>
        <thead>
          <tr>
            <th class="has-tip" data-table="sy_site" data-col="site_code" data-tbl-cmt="사이트" data-col-cmt="사이트코드 (UNIQUE)">코드</th>
            <th class="has-tip" data-table="sy_site" data-col="site_nm" data-tbl-cmt="사이트" data-col-cmt="사이트명">사이트명</th>
            <th class="has-tip" data-table="sy_site" data-col="site_status_cd" data-tbl-cmt="사이트" data-col-cmt="상태" data-code-grp="SITE_STATUS" data-codes="ACTIVE:운영중|MAINTENANCE:점검중|INACTIVE:비활성">상태</th>
            <th>선택</th>
          </tr>
        </thead>
        <tbody>
          <tr class="selected">
            <td>EC01</td>
            <td>ShopJoy 쇼핑몰</td>
            <td><span class="badge badge-green">운영중</span></td>
            <td><button class="btn btn-secondary btn-sm">선택</button></td>
          </tr>
          <tr>
            <td>ADMIN</td>
            <td>관리자 포털</td>
            <td><span class="badge badge-blue">운영중</span></td>
            <td><button class="btn btn-secondary btn-sm">선택</button></td>
          </tr>
          <tr>
            <td>EC02</td>
            <td>ShopJoy Mint</td>
            <td><span class="badge badge-orange">점검중</span></td>
            <td><button class="btn btn-secondary btn-sm">선택</button></td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 상세 폼 -->
    <div class="card">
      <div class="section-title">✏️ 사이트 상세 / 수정</div>
      <div class="ddl-ref">테이블: <strong>sy_site</strong> — 사이트</div>
      <div class="form-grid cols-3">
        <div class="form-group">
          <label class="form-label req has-tip" data-table="sy_site" data-col="site_code" data-tbl-cmt="사이트" data-col-cmt="사이트코드 (UNIQUE)">사이트코드</label>
          <input type="text" class="form-control" value="EC01">
        </div>
        <div class="form-group" style="grid-column:span 2">
          <label class="form-label req has-tip" data-table="sy_site" data-col="site_nm" data-tbl-cmt="사이트" data-col-cmt="사이트명">사이트명</label>
          <input type="text" class="form-control" value="ShopJoy 쇼핑몰">
        </div>
        <div class="form-group">
          <label class="form-label has-tip" data-table="sy_site" data-col="site_type_cd" data-tbl-cmt="사이트" data-col-cmt="사이트유형" data-code-grp="SITE_TYPE" data-codes="EC:쇼핑몰|ADMIN:관리자|API:API전용">사이트유형</label>
          <select class="form-control"><option value="EC">쇼핑몰</option><option value="ADMIN">관리자</option><option value="API">API전용</option></select>
        </div>
        <div class="form-group" style="grid-column:span 2">
          <label class="form-label has-tip" data-table="sy_site" data-col="site_domain" data-tbl-cmt="사이트" data-col-cmt="도메인">도메인</label>
          <input type="text" class="form-control" value="www.shopjoy.kr">
        </div>
        <div class="form-group full">
          <label class="form-label has-tip" data-table="sy_site" data-col="logo_url" data-tbl-cmt="사이트" data-col-cmt="로고URL">로고URL</label>
          <input type="text" class="form-control" placeholder="/assets/images/logo.png">
        </div>
        <div class="form-group full">
          <label class="form-label has-tip" data-table="sy_site" data-col="favicon_url" data-tbl-cmt="사이트" data-col-cmt="파비콘URL">파비콘URL</label>
          <input type="text" class="form-control" placeholder="/assets/images/favicon.ico">
        </div>
        <div class="form-group full">
          <label class="form-label has-tip" data-table="sy_site" data-col="site_desc" data-tbl-cmt="사이트" data-col-cmt="설명">설명</label>
          <textarea class="form-control">즐거운 쇼핑의 시작, ShopJoy</textarea>
        </div>
        <div class="form-group">
          <label class="form-label has-tip" data-table="sy_site" data-col="site_email" data-tbl-cmt="사이트" data-col-cmt="대표이메일">대표이메일</label>
          <input type="email" class="form-control" value="info@shopjoy.kr">
        </div>
        <div class="form-group">
          <label class="form-label has-tip" data-table="sy_site" data-col="site_phone" data-tbl-cmt="사이트" data-col-cmt="대표전화">대표전화</label>
          <input type="text" class="form-control" value="1588-0000">
        </div>
        <div class="form-group">
          <label class="form-label has-tip" data-table="sy_site" data-col="site_zip_code" data-tbl-cmt="사이트" data-col-cmt="우편번호">우편번호</label>
          <input type="text" class="form-control" value="06220">
        </div>
        <div class="form-group full">
          <label class="form-label has-tip" data-table="sy_site" data-col="site_address" data-tbl-cmt="사이트" data-col-cmt="주소">주소</label>
          <input type="text" class="form-control" value="서울특별시 강남구 테헤란로 123">
        </div>
        <div class="form-group">
          <label class="form-label has-tip" data-table="sy_site" data-col="site_business_no" data-tbl-cmt="사이트" data-col-cmt="사업자번호">사업자번호</label>
          <input type="text" class="form-control" value="123-45-67890">
        </div>
        <div class="form-group">
          <label class="form-label has-tip" data-table="sy_site" data-col="site_ceo" data-tbl-cmt="사이트" data-col-cmt="대표자명">대표자명</label>
          <input type="text" class="form-control" value="김대표">
        </div>
        <div class="form-group">
          <label class="form-label has-tip" data-table="sy_site" data-col="site_status_cd" data-tbl-cmt="사이트" data-col-cmt="상태" data-code-grp="SITE_STATUS" data-codes="ACTIVE:운영중|MAINTENANCE:점검중|INACTIVE:비활성">상태</label>
          <select class="form-control"><option value="ACTIVE">운영중</option><option value="MAINTENANCE">점검중</option><option value="INACTIVE">비활성</option></select>
        </div>
        <div class="form-group full">
          <label class="form-label has-tip" data-table="sy_site" data-col="config_json" data-tbl-cmt="사이트" data-col-cmt="확장설정(JSON)">확장설정 (JSON)</label>
          <textarea class="form-control" style="min-height:100px;font-family:monospace;font-size:12px">{"theme":"beige","currency":"KRW","lang":"ko"}</textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary">취소</button>
        <button class="btn btn-primary">💾 저장</button>
      </div>
    </div>
  </div>
</div>
<div class="tip-box" id="tipBox"></div>
<script>
const tb=document.getElementById('tipBox');
document.querySelectorAll('.has-tip').forEach(el=>{
  el.addEventListener('mouseenter',e=>{
    const d=el.dataset;
    let h=`<div class="tip-tbl">${d.table||''}</div><div class="tip-col">.${d.col||''}</div>`;
    if(d.tblCmt) h+=`<div class="tip-comment">📋 ${d.tblCmt}</div>`;
    if(d.colCmt) h+=`<div class="tip-comment">📌 ${d.colCmt}</div>`;
    if(d.codeGrp) h+=`<div class="tip-code-grp">코드그룹: ${d.codeGrp}</div>`;
    if(d.codes) h+=`<div class="tip-codes">${d.codes.split('|').map(c=>'· '+c).join('<br>')}</div>`;
    tb.innerHTML=h; tb.classList.add('show'); mv(e);
  });
  el.addEventListener('mousemove',mv);
  el.addEventListener('mouseleave',()=>tb.classList.remove('show'));
});
function mv(e){const x=e.clientX+14,y=e.clientY+14,w=tb.offsetWidth||260;tb.style.left=(x+w>window.innerWidth?x-w-28:x)+'px';tb.style.top=y+'px';}
</script>
</body>
</html>
