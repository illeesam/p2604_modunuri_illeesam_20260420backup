<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>역할/권한 관리 — SY</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f5f5f5;color:#333}
.page-header{background:#fff;border-bottom:1px solid #eee;padding:16px 24px}
.breadcrumb{font-size:12px;color:#999;margin-bottom:4px}
.breadcrumb span{color:#f06292;font-weight:600}
h1{font-size:18px;font-weight:700}
.container{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.layout-row{display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.section-title{font-size:14px;font-weight:700;color:#c2185b;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #fce4ec}
.btn{padding:7px 16px;border-radius:6px;font-size:13px;border:none;cursor:pointer;font-weight:500}
.btn-primary{background:linear-gradient(135deg,#f48fb1,#e91e63);color:#fff}
.btn-secondary{background:#f5f5f5;color:#555;border:1px solid #ddd}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-danger{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}
.list-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.list-title{font-size:14px;font-weight:600}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:14px}
.form-grid.cols-3{grid-template-columns:repeat(3,1fr)}
.full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:11px;color:#888;font-weight:500}
.form-label.req::after{content:'*';color:#e91e63;margin-left:3px}
.form-control{border:1px solid #ddd;border-radius:6px;padding:7px 10px;font-size:13px;outline:none;width:100%}
textarea.form-control{resize:vertical;min-height:72px}
.form-actions{display:flex;justify-content:flex-end;gap:8px;padding-top:14px;border-top:1px solid #f0f0f0;margin-top:16px}
.ddl-ref{background:#f8f9fa;border-radius:6px;padding:8px 12px;font-size:11px;color:#888;border-left:3px solid #f48fb1;margin-top:8px}
.ddl-ref strong{color:#c2185b}
.has-tip{cursor:help;border-bottom:1px dashed #f48fb1}
.tip-box{display:none;position:fixed;z-index:9999;background:#1a1a2e;color:#fff;border-radius:8px;padding:10px 12px;font-size:11px;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.4);line-height:1.8;pointer-events:none}
.tip-box.show{display:block}
.tip-tbl{color:#f48fb1;font-weight:700;font-size:12px}
.tip-col{color:#80cbc4;margin-bottom:3px}
.tip-comment{color:#e0e0e0}
.tip-code-grp{color:#ffcc80;margin-top:4px;font-size:10px}
.tip-codes{color:#b0bec5;font-size:10px;margin-top:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#e8f5e9;color:#2e7d32}
.badge-gray{background:#f5f5f5;color:#757575}
.badge-blue{background:#e3f2fd;color:#1565c0}
.badge-purple{background:#f3e5f5;color:#6a1b9a}
/* 트리 */
.tree-wrap{max-height:360px;overflow-y:auto;border:1px solid #f0f0f0;border-radius:8px;padding:8px}
.tree-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px}
.tree-item:hover{background:#fce4ec}
.tree-item.selected{background:#fce4ec;font-weight:600;color:#c2185b}
.tree-actions{margin-left:auto;display:flex;gap:4px;opacity:0}
.tree-item:hover .tree-actions{opacity:1}
/* 메뉴권한 테이블 */
.perm-table{width:100%;border-collapse:collapse;font-size:12px}
.perm-table th{background:#fce4ec;color:#c2185b;padding:8px 10px;text-align:center;border-bottom:2px solid #f48fb1;white-space:nowrap}
.perm-table td{padding:7px 10px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
.perm-table tr:hover td{background:#fff9fb}
.perm-table td:first-child{text-align:left;font-weight:500}
.perm-table td.center{text-align:center}
input[type=checkbox]{accent-color:#e91e63;width:14px;height:14px;cursor:pointer}
.tab-nav{display:flex;gap:4px;margin-bottom:14px}
.tab-btn{padding:6px 14px;border-radius:20px;font-size:12px;border:1px solid #ddd;background:#fff;cursor:pointer;font-weight:500}
.tab-btn.active{background:linear-gradient(135deg,#f48fb1,#e91e63);color:#fff;border-color:transparent}
</style>
</head>
<body>
<div class="page-header">
  <div class="breadcrumb">관리자 &gt; 시스템관리 &gt; <span>역할/권한 관리</span></div>
  <h1>🔐 역할/권한 관리</h1>
</div>
<div class="container">
  <div class="layout-row">

    <!-- 좌측: 역할 트리 -->
    <div class="card">
      <div class="list-toolbar">
        <span class="list-title has-tip" data-table="sy_role" data-col="parent_role_id" data-tbl-cmt="역할 (권한그룹)" data-col-cmt="상위역할ID — 계층 트리 구성">역할 트리</span>
        <button class="btn btn-primary btn-sm">+ 역할추가</button>
      </div>
      <div class="tree-wrap">
        <div class="tree-item selected">
          <span>▼</span>
          <span class="has-tip" data-table="sy_role" data-col="role_nm" data-tbl-cmt="역할 (권한그룹)" data-col-cmt="역할명">시스템관리자</span>
          <span class="badge badge-purple" style="font-size:10px">시스템</span>
          <div class="tree-actions">
            <button class="btn btn-secondary btn-xs">수정</button>
            <button class="btn btn-danger btn-xs">삭제</button>
          </div>
        </div>
        <div class="tree-item" style="padding-left:24px">
          <span>─</span>
          <span class="has-tip" data-table="sy_role" data-col="role_nm" data-tbl-cmt="역할 (권한그룹)" data-col-cmt="역할명">운영자</span>
          <span class="badge badge-blue" style="font-size:10px">사용자정의</span>
          <div class="tree-actions">
            <button class="btn btn-secondary btn-xs">수정</button>
            <button class="btn btn-danger btn-xs">삭제</button>
          </div>
        </div>
        <div class="tree-item" style="padding-left:24px">
          <span>─</span>
          <span class="has-tip" data-table="sy_role" data-col="role_nm" data-tbl-cmt="역할 (권한그룹)" data-col-cmt="역할명">CS담당자</span>
          <span class="badge badge-blue" style="font-size:10px">사용자정의</span>
          <div class="tree-actions">
            <button class="btn btn-secondary btn-xs">수정</button>
            <button class="btn btn-danger btn-xs">삭제</button>
          </div>
        </div>
        <div class="tree-item" style="padding-left:24px">
          <span>─</span>
          <span class="has-tip" data-table="sy_role" data-col="role_nm" data-tbl-cmt="역할 (권한그룹)" data-col-cmt="역할명">배송담당자</span>
          <span class="badge badge-blue" style="font-size:10px">사용자정의</span>
          <div class="tree-actions">
            <button class="btn btn-secondary btn-xs">수정</button>
            <button class="btn btn-danger btn-xs">삭제</button>
          </div>
        </div>
        <div class="tree-item" style="padding-left:24px">
          <span>─</span>
          <span class="has-tip" data-table="sy_role" data-col="role_nm" data-tbl-cmt="역할 (권한그룹)" data-col-cmt="역할명">상품관리자</span>
          <span class="badge badge-blue" style="font-size:10px">사용자정의</span>
          <div class="tree-actions">
            <button class="btn btn-secondary btn-xs">수정</button>
            <button class="btn btn-danger btn-xs">삭제</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 우측: 역할 정보 + 메뉴권한 -->
    <div style="display:flex;flex-direction:column;gap:16px">

      <!-- 역할 폼 -->
      <div class="card">
        <div class="section-title">✏️ 역할 정보</div>
        <div class="ddl-ref">테이블: <strong>sy_role</strong> — 역할 (권한그룹)</div>
        <div class="form-grid cols-3">
          <div class="form-group">
            <label class="form-label req has-tip" data-table="sy_role" data-col="role_code" data-tbl-cmt="역할 (권한그룹)" data-col-cmt="역할코드 (UNIQUE)">역할코드</label>
            <input type="text" class="form-control" value="SYS_ADMIN">
          </div>
          <div class="form-group" style="grid-column:span 2">
            <label class="form-label req has-tip" data-table="sy_role" data-col="role_nm" data-tbl-cmt="역할 (권한그룹)" data-col-cmt="역할명">역할명</label>
            <input type="text" class="form-control" value="시스템관리자">
          </div>
          <div class="form-group">
            <label class="form-label has-tip" data-table="sy_role" data-col="parent_role_id" data-tbl-cmt="역할 (권한그룹)" data-col-cmt="상위역할ID">상위역할</label>
            <select class="form-control"><option value="">-- 최상위 --</option><option>운영자</option></select>
          </div>
          <div class="form-group">
            <label class="form-label has-tip" data-table="sy_role" data-col="role_type_cd" data-tbl-cmt="역할 (권한그룹)" data-col-cmt="역할유형" data-code-grp="ROLE_TYPE" data-codes="SYSTEM:시스템|CUSTOM:사용자정의">역할유형</label>
            <select class="form-control"><option value="SYSTEM">시스템</option><option value="CUSTOM">사용자정의</option></select>
          </div>
          <div class="form-group">
            <label class="form-label has-tip" data-table="sy_role" data-col="sort_ord" data-tbl-cmt="역할 (권한그룹)" data-col-cmt="정렬순서">정렬순서</label>
            <input type="number" class="form-control" value="1">
          </div>
          <div class="form-group">
            <label class="form-label has-tip" data-table="sy_role" data-col="use_yn" data-tbl-cmt="역할 (권한그룹)" data-col-cmt="사용여부">사용여부</label>
            <select class="form-control"><option value="Y">사용</option><option value="N">미사용</option></select>
          </div>
          <div class="form-group">
            <label class="form-label has-tip" data-table="sy_role" data-col="restrict_perm" data-tbl-cmt="역할 (권한그룹)" data-col-cmt="제한권한여부 Y/N">제한권한여부</label>
            <select class="form-control"><option value="N">N (전체허용)</option><option value="Y">Y (제한)</option></select>
          </div>
          <div class="form-group full">
            <label class="form-label has-tip" data-table="sy_role" data-col="role_remark" data-tbl-cmt="역할 (권한그룹)" data-col-cmt="비고">비고</label>
            <textarea class="form-control" placeholder="역할 메모"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary">취소</button>
          <button class="btn btn-primary">💾 저장</button>
        </div>
      </div>

      <!-- 메뉴 권한 테이블 -->
      <div class="card">
        <div class="section-title">📋 메뉴 권한 설정</div>
        <div class="ddl-ref">테이블: <strong>sy_role_menu</strong> — 역할별 메뉴 권한</div>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:10px">
          <button class="btn btn-secondary btn-sm">전체해제</button>
          <button class="btn btn-primary btn-sm">전체선택</button>
        </div>
        <table class="perm-table">
          <thead>
            <tr>
              <th class="has-tip" data-table="sy_menu" data-col="menu_nm" data-tbl-cmt="관리자 메뉴" data-col-cmt="메뉴명">메뉴명</th>
              <th class="has-tip" data-table="sy_role_menu" data-col="perm_read" data-tbl-cmt="역할별 메뉴 권한" data-col-cmt="조회 권한 Y/N">조회</th>
              <th class="has-tip" data-table="sy_role_menu" data-col="perm_create" data-tbl-cmt="역할별 메뉴 권한" data-col-cmt="등록 권한 Y/N">등록</th>
              <th class="has-tip" data-table="sy_role_menu" data-col="perm_update" data-tbl-cmt="역할별 메뉴 권한" data-col-cmt="수정 권한 Y/N">수정</th>
              <th class="has-tip" data-table="sy_role_menu" data-col="perm_delete" data-tbl-cmt="역할별 메뉴 권한" data-col-cmt="삭제 권한 Y/N">삭제</th>
            </tr>
          </thead>
          <tbody>
            <tr><td>회원관리</td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td></tr>
            <tr><td style="padding-left:20px">·  회원 목록</td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td></tr>
            <tr><td>상품관리</td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox"></td></tr>
            <tr><td style="padding-left:20px">·  상품 목록</td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox"></td></tr>
            <tr><td>주문관리</td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox"></td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox"></td></tr>
            <tr><td style="padding-left:20px">·  주문 목록</td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox"></td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox"></td></tr>
            <tr><td>시스템관리</td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td></tr>
            <tr><td style="padding-left:20px">·  사용자 관리</td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td></tr>
            <tr><td style="padding-left:20px">·  역할 관리</td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td><td class="center"><input type="checkbox" checked></td></tr>
          </tbody>
        </table>
        <div class="form-actions">
          <button class="btn btn-primary">🔐 권한 저장</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="tip-box" id="tipBox"></div>
<script>
const tb=document.getElementById('tipBox');
document.querySelectorAll('.has-tip').forEach(el=>{
  el.addEventListener('mouseenter',e=>{
    const d=el.dataset;
    let h=`<div class="tip-tbl">${d.table||''}</div><div class="tip-col">.${d.col||''}</div>`;
    if(d.tblCmt) h+=`<div class="tip-comment">📋 ${d.tblCmt}</div>`;
    if(d.colCmt) h+=`<div class="tip-comment">📌 ${d.colCmt}</div>`;
    if(d.codeGrp) h+=`<div class="tip-code-grp">코드그룹: ${d.codeGrp}</div>`;
    if(d.codes) h+=`<div class="tip-codes">${d.codes.split('|').map(c=>'· '+c).join('<br>')}</div>`;
    tb.innerHTML=h; tb.classList.add('show'); mv(e);
  });
  el.addEventListener('mousemove',mv);
  el.addEventListener('mouseleave',()=>tb.classList.remove('show'));
});
function mv(e){const x=e.clientX+14,y=e.clientY+14,w=tb.offsetWidth||260;tb.style.left=(x+w>window.innerWidth?x-w-28:x)+'px';tb.style.top=y+'px';}
</script>
</body>
</html>
