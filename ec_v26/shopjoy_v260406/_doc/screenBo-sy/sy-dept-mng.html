<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>부서 관리 — SY</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f5f5f5;color:#333}
.page-header{background:#fff;border-bottom:1px solid #eee;padding:16px 24px}
.breadcrumb{font-size:12px;color:#999;margin-bottom:4px}
.breadcrumb span{color:#f06292;font-weight:600}
h1{font-size:18px;font-weight:700}
.container{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.layout-row{display:grid;grid-template-columns:360px 1fr;gap:16px;align-items:start}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.section-title{font-size:14px;font-weight:700;color:#c2185b;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #fce4ec}
.btn{padding:7px 16px;border-radius:6px;font-size:13px;border:none;cursor:pointer;font-weight:500}
.btn-primary{background:linear-gradient(135deg,#f48fb1,#e91e63);color:#fff}
.btn-secondary{background:#f5f5f5;color:#555;border:1px solid #ddd}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}
.btn-xs{padding:3px 8px;font-size:11px}
.list-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.list-title{font-size:14px;font-weight:600}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:14px}
.full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:11px;color:#888;font-weight:500}
.form-label.req::after{content:'*';color:#e91e63;margin-left:3px}
.form-control{border:1px solid #ddd;border-radius:6px;padding:7px 10px;font-size:13px;outline:none;width:100%}
textarea.form-control{resize:vertical;min-height:72px}
.form-actions{display:flex;justify-content:flex-end;gap:8px;padding-top:14px;border-top:1px solid #f0f0f0;margin-top:16px}
.ddl-ref{background:#f8f9fa;border-radius:6px;padding:8px 12px;font-size:11px;color:#888;border-left:3px solid #f48fb1;margin-top:8px}
.ddl-ref strong{color:#c2185b}
.has-tip{cursor:help;border-bottom:1px dashed #f48fb1}
.tip-box{display:none;position:fixed;z-index:9999;background:#1a1a2e;color:#fff;border-radius:8px;padding:10px 12px;font-size:11px;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.4);line-height:1.8;pointer-events:none}
.tip-box.show{display:block}
.tip-tbl{color:#f48fb1;font-weight:700;font-size:12px}
.tip-col{color:#80cbc4;margin-bottom:3px}
.tip-comment{color:#e0e0e0}
.tip-code-grp{color:#ffcc80;margin-top:4px;font-size:10px}
.tip-codes{color:#b0bec5;font-size:10px;margin-top:2px}
/* 트리 */
.tree-wrap{max-height:400px;overflow-y:auto;border:1px solid #f0f0f0;border-radius:8px;padding:8px}
.tree-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px}
.tree-item:hover{background:#fce4ec}
.tree-item.selected{background:#fce4ec;font-weight:600;color:#c2185b}
.tree-indent{display:inline-block;width:16px}
.tree-icon{color:#f06292;font-size:11px}
.tree-badge{font-size:10px;color:#aaa;margin-left:4px}
.tree-actions{margin-left:auto;display:flex;gap:4px;opacity:0}
.tree-item:hover .tree-actions{opacity:1}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#e8f5e9;color:#2e7d32}
.badge-gray{background:#f5f5f5;color:#757575}
</style>
</head>
<body>
<div class="page-header">
  <div class="breadcrumb">관리자 &gt; 시스템관리 &gt; <span>부서 관리</span></div>
  <h1>🏢 부서 관리</h1>
</div>
<div class="container">
  <div class="layout-row">

    <!-- 부서 트리 -->
    <div class="card">
      <div class="list-toolbar">
        <span class="list-title has-tip" data-table="sy_dept" data-col="parent_id" data-tbl-cmt="부서" data-col-cmt="상위부서ID — parent_id 기반 계층 트리">부서 트리</span>
        <button class="btn btn-primary btn-sm">+ 부서추가</button>
      </div>
      <div class="tree-wrap">
        <!-- 1단계 -->
        <div class="tree-item selected">
          <span class="tree-icon">▼</span>
          <span class="has-tip" data-table="sy_dept" data-col="dept_nm" data-tbl-cmt="부서" data-col-cmt="부서명">경영지원본부</span>
          <span class="tree-badge has-tip" data-table="sy_dept" data-col="dept_cd" data-tbl-cmt="부서" data-col-cmt="부서코드">MGMT</span>
          <span class="badge badge-green" style="font-size:10px">사용</span>
          <div class="tree-actions">
            <button class="btn btn-secondary btn-xs">수정</button>
            <button class="btn btn-danger btn-xs">삭제</button>
          </div>
        </div>
        <!-- 2단계 -->
        <div class="tree-item" style="padding-left:28px">
          <span class="tree-icon">▼</span>
          <span class="has-tip" data-table="sy_dept" data-col="dept_nm" data-tbl-cmt="부서" data-col-cmt="부서명">개발팀</span>
          <span class="tree-badge has-tip" data-table="sy_dept" data-col="dept_cd" data-tbl-cmt="부서" data-col-cmt="부서코드">DEV</span>
          <span class="badge badge-green" style="font-size:10px">사용</span>
          <div class="tree-actions">
            <button class="btn btn-secondary btn-xs">수정</button>
            <button class="btn btn-danger btn-xs">삭제</button>
          </div>
        </div>
        <!-- 3단계 -->
        <div class="tree-item" style="padding-left:52px">
          <span class="tree-icon">─</span>
          <span class="has-tip" data-table="sy_dept" data-col="dept_nm" data-tbl-cmt="부서" data-col-cmt="부서명">프론트엔드팀</span>
          <span class="tree-badge has-tip" data-table="sy_dept" data-col="dept_cd" data-tbl-cmt="부서" data-col-cmt="부서코드">FE</span>
          <span class="badge badge-green" style="font-size:10px">사용</span>
          <div class="tree-actions">
            <button class="btn btn-secondary btn-xs">수정</button>
            <button class="btn btn-danger btn-xs">삭제</button>
          </div>
        </div>
        <div class="tree-item" style="padding-left:52px">
          <span class="tree-icon">─</span>
          <span class="has-tip" data-table="sy_dept" data-col="dept_nm" data-tbl-cmt="부서" data-col-cmt="부서명">백엔드팀</span>
          <span class="tree-badge has-tip" data-table="sy_dept" data-col="dept_cd" data-tbl-cmt="부서" data-col-cmt="부서코드">BE</span>
          <span class="badge badge-green" style="font-size:10px">사용</span>
          <div class="tree-actions">
            <button class="btn btn-secondary btn-xs">수정</button>
            <button class="btn btn-danger btn-xs">삭제</button>
          </div>
        </div>
        <!-- 2단계 -->
        <div class="tree-item" style="padding-left:28px">
          <span class="tree-icon">▼</span>
          <span class="has-tip" data-table="sy_dept" data-col="dept_nm" data-tbl-cmt="부서" data-col-cmt="부서명">운영팀</span>
          <span class="tree-badge has-tip" data-table="sy_dept" data-col="dept_cd" data-tbl-cmt="부서" data-col-cmt="부서코드">OPS</span>
          <span class="badge badge-green" style="font-size:10px">사용</span>
          <div class="tree-actions">
            <button class="btn btn-secondary btn-xs">수정</button>
            <button class="btn btn-danger btn-xs">삭제</button>
          </div>
        </div>
        <div class="tree-item" style="padding-left:28px">
          <span class="tree-icon">─</span>
          <span class="has-tip" data-table="sy_dept" data-col="dept_nm" data-tbl-cmt="부서" data-col-cmt="부서명">CS팀</span>
          <span class="tree-badge has-tip" data-table="sy_dept" data-col="dept_cd" data-tbl-cmt="부서" data-col-cmt="부서코드">CS</span>
          <span class="badge badge-gray" style="font-size:10px">미사용</span>
          <div class="tree-actions">
            <button class="btn btn-secondary btn-xs">수정</button>
            <button class="btn btn-danger btn-xs">삭제</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 상세 폼 -->
    <div class="card">
      <div class="section-title">✏️ 부서 등록 / 수정</div>
      <div class="ddl-ref">테이블: <strong>sy_dept</strong> — 부서</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label req has-tip" data-table="sy_dept" data-col="dept_nm" data-tbl-cmt="부서" data-col-cmt="부서명">부서명</label>
          <input type="text" class="form-control" value="경영지원본부">
        </div>
        <div class="form-group">
          <label class="form-label has-tip" data-table="sy_dept" data-col="dept_cd" data-tbl-cmt="부서" data-col-cmt="부서코드">부서코드</label>
          <input type="text" class="form-control" value="MGMT">
        </div>
        <div class="form-group">
          <label class="form-label has-tip" data-table="sy_dept" data-col="parent_id" data-tbl-cmt="부서" data-col-cmt="상위부서ID">상위부서</label>
          <select class="form-control"><option value="">-- 최상위 --</option><option>경영지원본부</option></select>
        </div>
        <div class="form-group">
          <label class="form-label has-tip" data-table="sy_dept" data-col="site_id" data-tbl-cmt="부서" data-col-cmt="사이트ID">사이트</label>
          <select class="form-control"><option>ShopJoy 쇼핑몰</option><option>관리자 포털</option></select>
        </div>
        <div class="form-group">
          <label class="form-label has-tip" data-table="sy_dept" data-col="dept_level" data-tbl-cmt="부서" data-col-cmt="계층레벨">계층레벨</label>
          <input type="number" class="form-control" value="1" min="1" max="5">
        </div>
        <div class="form-group">
          <label class="form-label has-tip" data-table="sy_dept" data-col="sort_ord" data-tbl-cmt="부서" data-col-cmt="정렬순서">정렬순서</label>
          <input type="number" class="form-control" value="10">
        </div>
        <div class="form-group">
          <label class="form-label has-tip" data-table="sy_dept" data-col="use_yn" data-tbl-cmt="부서" data-col-cmt="사용여부">사용여부</label>
          <select class="form-control"><option value="Y">사용</option><option value="N">미사용</option></select>
        </div>
        <div class="form-group full">
          <label class="form-label has-tip" data-table="sy_dept" data-col="dept_remark" data-tbl-cmt="부서" data-col-cmt="비고">비고</label>
          <textarea class="form-control" placeholder="부서 메모"></textarea>
        </div>
        <div class="form-group full">
          <label class="form-label has-tip" data-table="sy_dept" data-col="disp_path" data-tbl-cmt="부서" data-col-cmt="표시경로">표시경로</label>
          <input type="text" class="form-control" value="경영지원본부" readonly style="background:#f8f9fa;color:#888">
          <div style="font-size:11px;color:#aaa;margin-top:2px">자동 생성 (상위경로 > 현재부서명)</div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary">취소</button>
        <button class="btn btn-primary">💾 저장</button>
      </div>
    </div>
  </div>
</div>
<div class="tip-box" id="tipBox"></div>
<script>
const tb=document.getElementById('tipBox');
document.querySelectorAll('.has-tip').forEach(el=>{
  el.addEventListener('mouseenter',e=>{
    const d=el.dataset;
    let h=`<div class="tip-tbl">${d.table||''}</div><div class="tip-col">.${d.col||''}</div>`;
    if(d.tblCmt) h+=`<div class="tip-comment">📋 ${d.tblCmt}</div>`;
    if(d.colCmt) h+=`<div class="tip-comment">📌 ${d.colCmt}</div>`;
    if(d.codeGrp) h+=`<div class="tip-code-grp">코드그룹: ${d.codeGrp}</div>`;
    if(d.codes) h+=`<div class="tip-codes">${d.codes.split('|').map(c=>'· '+c).join('<br>')}</div>`;
    tb.innerHTML=h; tb.classList.add('show'); mv(e);
  });
  el.addEventListener('mousemove',mv);
  el.addEventListener('mouseleave',()=>tb.classList.remove('show'));
});
function mv(e){const x=e.clientX+14,y=e.clientY+14,w=tb.offsetWidth||260;tb.style.left=(x+w>window.innerWidth?x-w-28:x)+'px';tb.style.top=y+'px';}
</script>
</body>
</html>
