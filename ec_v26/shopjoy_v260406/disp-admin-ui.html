<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DispUi 미리보기 (관리자)</title>
  <script>
    /* ═══════════════════════════════════════════════════════════════════
       사이트 기본값 설정 (변경 시 이 한 줄만 수정)
       ═══════════════════════════════════════════════════════════════════ */
    const DEFAULT_FRONT_SITE_NO = '01';
    window.FRONT_SITE_NO = (typeof localStorage !== 'undefined' && localStorage.getItem('modu-front-site_no')) || DEFAULT_FRONT_SITE_NO;
    /* 다른 탭에서 SITE_NO 변경 시 자동 반영 */
    window.addEventListener('storage', function(e){
      if ((e.key === 'modu-front-site_no' || e.key === 'modu-admin-site_no') && e.newValue !== e.oldValue) {
        location.reload();
      }
    });
  </script>
  <script src="assets/cdn/pkg/vue/3.4.21/vue.global.prod.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap">
  <script src="assets/cdn/pkg/marked/11.1.1/marked.min.js"></script>
  <script src="assets/cdn/pkg/axios/1.7.9/axios.min.js"></script>
  <script src="assets/cdn/pkg/yup/1.0.0.shim/yup.js"></script>
  <link rel="stylesheet" href="assets/css/adminGlobalStyle01.css">
  <script src="pages/admin/AdminData.js"></script>
  <script src="utils/adminAxios.js"></script>
  <script src="utils/adminUtil.js"></script>
  <script src="components/comp/BaseComp.js"></script>
  <script src="pages/base/adminError404.js"></script>
  <script src="components/disp/DispX04Widget.js"></script>
  <script src="components/disp/DispX03Panel.js"></script>
  <script src="components/disp/DispX02Area.js"></script>
  <script src="components/disp/DispX01Ui.js"></script>
  <script src="pages/xd/DispUiPage.js"></script>
  <script src="pages/xd/DispUi01.js"></script>
  <script src="pages/xd/DispUi02.js"></script>
  <script src="pages/xd/DispUi03.js"></script>
  <script src="pages/xd/DispUi04.js"></script>
  <script src="pages/xd/DispUi05.js"></script>
  <script src="pages/xd/DispUi06.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f5f6fa; color: #222; }
    #_boot_loading { position:fixed; inset:0; z-index:99999;
      display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px;
      background:#1a1d24; font-family:system-ui,-apple-system,'Noto Sans KR',sans-serif; }
    #_boot_loading .spin { width:44px; height:44px; border-radius:50%;
      border:3px solid rgba(255,255,255,0.12); border-top-color:#e8587a;
      animation:_bootspin .8s linear infinite; }
    #_boot_loading .txt { font-size:14px; color:#cfd3dc; letter-spacing:0.02em; font-weight:500; }
    @keyframes _bootspin { to { transform: rotate(360deg); } }
    #_boot_loading.done { opacity:0; transition:opacity .25s; pointer-events:none; }
  </style>
</head>
<body>
  <div id="_boot_loading" role="status" aria-busy="true">
    <div class="spin" aria-hidden="true"></div>
    <div class="txt">로딩 중…</div>
  </div>
  <div id="app"></div>
  <script>
    const { createApp, ref, computed, onMounted, onUnmounted } = Vue;

    /* ── 해시 라우팅 래퍼 ── */
    const DispUiApp = {
      name: 'DispUiApp',
      setup() {
        const PAGE_MAP = {
          'DispUi01': 'disp-ui01',
          'DispUi02': 'disp-ui02',
          'DispUi03': 'disp-ui03',
          'DispUi04': 'disp-ui04',
          'DispUi05': 'disp-ui05',
          'DispUi06': 'disp-ui06',
        };
        const PAGE_LABELS = [
          { key: 'DispUi01', label: 'HOME', icon: '🏠' },
          { key: 'DispUi02', label: 'CATEGORY/SEARCH', icon: '🔍' },
          { key: 'DispUi03', label: 'PRODUCT/EVENT', icon: '📦' },
          { key: 'DispUi04', label: 'MY_PAGE/FOOTER', icon: '👤' },
          { key: 'DispUi05', label: 'DispUi05', icon: '📋' },
          { key: 'DispUi06', label: 'DispUi06', icon: '📋' },
        ];

        const getPage = () => {
          const h = location.hash.replace('#','');
          const qs = new URLSearchParams(location.search);
          if (h && PAGE_MAP[h]) return h;
          if (qs.get('areas')) return 'DispUiPage';
          return 'DispUi01'; /* 기본: DispUi01 */
        };

        const currentPage = ref(getPage());
        const onHash = () => { currentPage.value = getPage(); };
        onMounted(() => window.addEventListener('hashchange', onHash));
        onUnmounted(() => window.removeEventListener('hashchange', onHash));

        const isPage = (key) => currentPage.value === key;
        const go = (key) => { location.hash = key; };

        return { currentPage, isPage, go, PAGE_LABELS };
      },
      template: /* html */`
<div>
  <!-- 탭 네비게이션 (DispUiPage 모드가 아닐 때) -->
  <div v-if="currentPage !== 'DispUiPage'"
    style="display:flex;gap:0;background:#2d2d2d;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.3);">
    <button v-for="p in PAGE_LABELS" :key="p.key"
      @click="go(p.key)"
      style="flex:1;padding:10px 8px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .15s;"
      :style="isPage(p.key)
        ? 'background:#fff;color:#6a1b9a;border-bottom:3px solid #6a1b9a;'
        : 'background:transparent;color:#aaa;border-bottom:3px solid transparent;'"
    >{{ p.icon }} {{ p.label }}</button>
  </div>

  <!-- 페이지 렌더링 -->
  <disp-ui-page   v-if="currentPage==='DispUiPage'" />
  <disp-ui01      v-else-if="currentPage==='DispUi01'" />
  <disp-ui02      v-else-if="currentPage==='DispUi02'" />
  <disp-ui03      v-else-if="currentPage==='DispUi03'" />
  <disp-ui04      v-else-if="currentPage==='DispUi04'" />
  <disp-ui05      v-else-if="currentPage==='DispUi05'" />
  <disp-ui06      v-else-if="currentPage==='DispUi06'" />
</div>
`,
    };

    const app = createApp(DispUiApp);
    app.component('AdminError404',        window.adminError404);
    app.component('DispX01Ui',       window.DispX01Ui);
    app.component('DispX02Area',     window.DispX02Area);
    app.component('DispX03Panel',    window.DispX03Panel);
    app.component('DispX04Widget',   window.DispX04Widget);
    app.component('DispUiPage',      window.DispUiPage);
    ['DispUi01', 'DispUi02', 'DispUi03', 'DispUi04', 'DispUi05', 'DispUi06'].forEach(name => {
      if (window[name]) app.component(name, window[name]);
    });
    app.mount('#app');
    const loadingEl = document.getElementById('_boot_loading');
    if (loadingEl) {
      loadingEl.classList.add('done');
      setTimeout(() => { if (loadingEl.parentNode) loadingEl.parentNode.removeChild(loadingEl); }, 350);
    }
  </script>
</body>
</html>
