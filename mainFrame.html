<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    (function () {
      try {
        var p = new URLSearchParams(window.location.search);
        if (p.get('app') === '1') {
          try {
            sessionStorage.removeItem('intSmsMdStandalone');
          } catch (e) {}
          return;
        }
        var wasStandalone = false;
        try {
          wasStandalone = sessionStorage.getItem('intSmsMdStandalone') === '1';
        } catch (e2) {}
        if (p.get('embed') === '1' || p.get('tw') || p.get('pop') === '1' || wasStandalone) {
          document.documentElement.classList.add('embed-view');
        }
      } catch (e) {}
    })();
  </script>
  <title>종합서비스관리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css" />
  <style>
    :root {
      --bg: #f4f6f9;
      --sidebar-bg: #1e293b;
      --sidebar-text: #e2e8f0;
      --sidebar-hover: #334155;
      --accent: #3b82f6;
      --header-h: 62px;
      --sidebar-w: 260px;
      --tab-h: 44px;
      --border: #e2e8f0;
      /* 비활성 탭: 어두운 톤(#c5~#8b)과 활성(#fff)의 중간 밝기 */
      --tab-bar-bg: #d0d8e4;
      --tab-inactive-top: #f1f4f9;
      --tab-inactive-bot: #d8dfe9;
      --tab-edge: #aab6c5;
      --tab-active-ring: #3b82f6;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: "Segoe UI", "Malgun Gothic", sans-serif; background: var(--bg); }
    .app { display: flex; flex-direction: column; height: 100vh; min-height: 0; }
    /* 독립 뷰: `?tw`/`?pop`/구 `?embed=1` 또는 이 탭 sessionStorage `intSmsMdStandalone`. 전체 UI는 `?app=1` */
    html.embed-view .topbar,
    html.embed-view .sidebar-column,
    html.embed-view .sidebar,
    html.embed-view .tab-bar {
      display: none !important;
    }
    html.embed-view .body-row {
      flex: 1 1 auto;
      min-height: 0;
    }
    html.embed-view .main {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      width: 100%;
    }
    html.embed-view .content-wrap {
      flex: 1 1 auto;
      min-height: 0;
    }
    /* 상단 */
    .topbar {
      flex: 0 0 auto;
      min-height: var(--header-h);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 0.75rem;
      padding: 0 1rem 0 0.45rem;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      color: #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
    }
    .topbar-brand {
      justify-self: start;
      min-width: 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0.45rem;
    }
    .topbar-app-title {
      margin: 0;
      font-size: 1.02rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: rgba(255, 255, 255, 0.96);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-toggle-btn {
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      margin: 0;
      margin-left: -2px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: rgba(255, 255, 255, 0.82);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .sidebar-toggle-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }
    .sidebar-toggle-btn:focus-visible {
      outline: 2px solid rgba(147, 197, 253, 0.95);
      outline-offset: 1px;
    }
    .sidebar-toggle-btn svg {
      display: block;
      flex-shrink: 0;
    }
    .sidebar-toggle-btn .icon-when-sidebar-open {
      display: block;
    }
    .sidebar-toggle-btn .icon-when-sidebar-closed {
      display: none;
    }
    .app.sidebar-collapsed .sidebar-toggle-btn .icon-when-sidebar-open {
      display: none;
    }
    .app.sidebar-collapsed .sidebar-toggle-btn .icon-when-sidebar-closed {
      display: block;
    }
    .topbar-nav {
      justify-self: center;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0.45rem 0.65rem;
      flex-wrap: wrap;
      max-width: min(100vw - 2rem, 72rem);
      min-width: 0;
    }
    .topbar-nav-selects {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: center;
      gap: 0.45rem 0.65rem;
    }
    .topbar-select-group {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      align-items: stretch;
      min-width: 0;
    }
    .topbar-select-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: rgba(255, 255, 255, 0.62);
      white-space: nowrap;
    }
    .topbar-app-select {
      margin: 0;
      min-width: 11.25rem;
      max-width: 19.5rem;
      padding: 0.42rem 0.45rem;
      font-size: 0.78rem;
      font-weight: 600;
      font-family: inherit;
      line-height: 1.25;
      letter-spacing: -0.02em;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      box-sizing: border-box;
      vertical-align: middle;
    }
    .topbar-app-select:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.32);
    }
    .topbar-app-select:focus-visible {
      outline: 2px solid rgba(147, 197, 253, 0.95);
      outline-offset: 2px;
    }
    .topbar-app-select[aria-current="page"] {
      border-color: rgba(125, 211, 252, 0.55);
      background: rgba(56, 189, 248, 0.18);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.15) inset;
    }
    .topbar-app-select option {
      color: #0f172a;
      background: #fff;
      font-weight: 600;
    }
    .topbar-app-select:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .topbar-right {
      justify-self: end;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0.55rem;
      min-width: 0;
    }
    .topbar-meta { font-size: 0.8rem; opacity: 0.85; text-align: right; line-height: 1.35; }
    .topbar-meta span { display: block; }
    .topbar-search-btn {
      flex: 0 0 auto;
      width: 40px;
      height: 40px;
      margin: 0;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.92);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .topbar-search-btn:hover {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.35);
      color: #fff;
    }
    .topbar-search-btn:focus-visible {
      outline: 2px solid rgba(147, 197, 253, 0.95);
      outline-offset: 2px;
    }
    .topbar-search-btn[aria-expanded="true"] {
      border-color: rgba(125, 211, 252, 0.55);
      background: rgba(56, 189, 248, 0.18);
    }
    .topbar-search-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9998;
      background: rgba(15, 23, 42, 0.45);
    }
    .topbar-search-backdrop.is-open {
      display: block;
    }
    .topbar-search-panel {
      display: none;
      position: fixed;
      z-index: 9999;
      top: calc(var(--header-h) + 8px);
      right: 1rem;
      left: auto;
      width: min(960px, calc(100vw - 2rem));
      max-height: min(78vh, 560px);
      flex-direction: column;
      background: #fff;
      color: #0f172a;
      border-radius: 12px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.22), 0 0 0 1px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }
    .topbar-search-panel.is-open {
      display: flex;
    }
    .topbar-search-panel-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 0.85rem;
      border-bottom: 1px solid #e2e8f0;
      background: #f8fafc;
    }
    .topbar-search-panel-head label {
      font-size: 0.75rem;
      font-weight: 700;
      color: #475569;
    }
    .topbar-search-input {
      flex: 1 1 160px;
      min-width: 0;
      margin: 0;
      padding: 0.45rem 0.55rem;
      font: inherit;
      font-size: 0.85rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
    }
    .topbar-search-input:focus {
      outline: 2px solid rgba(59, 130, 246, 0.45);
      outline-offset: 0;
      border-color: #3b82f6;
    }
    .topbar-search-close {
      flex: 0 0 auto;
      width: 32px;
      height: 32px;
      margin: 0;
      padding: 0;
      font-size: 1.35rem;
      line-height: 1;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #64748b;
      cursor: pointer;
    }
    .topbar-search-close:hover {
      background: #e2e8f0;
      color: #0f172a;
    }
    .topbar-search-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0.65rem 0.85rem 0.85rem;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.65rem;
      align-items: stretch;
    }
    .topbar-search-section {
      margin: 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      padding: 0.5rem 0.45rem;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #fafbfc;
    }
    .topbar-search-section-title {
      margin: 0 0 0.45rem;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: none;
      color: #475569;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 0.3rem;
    }
    .topbar-search-section-title span {
      margin-right: 0.35rem;
    }
    .topbar-search-items {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      flex: 1 1 auto;
      min-height: 0;
    }
    .topbar-search-no-match {
      display: none;
      margin: 0;
      padding: 0.35rem 0.2rem;
      font-size: 0.72rem;
      color: #94a3b8;
      font-style: italic;
    }
    @media (max-width: 900px) {
      .topbar-search-panel {
        width: min(640px, calc(100vw - 2rem));
      }
      .topbar-search-body {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 480px) {
      .topbar-search-body {
        grid-template-columns: 1fr;
      }
    }
    .topbar-search-row {
      display: flex;
      align-items: stretch;
      margin: 0;
      padding: 0;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
      transition: background 0.12s, border-color 0.12s;
    }
    .topbar-search-row:hover {
      background: #eff6ff;
      border-color: #93c5fd;
    }
    .topbar-search-item {
      margin: 0;
      flex: 1 1 auto;
      min-width: 0;
      padding: 0.45rem 0.55rem;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      text-align: left;
      border: none;
      border-radius: 0;
      background: transparent;
      color: #0f172a;
      cursor: pointer;
      transition: color 0.12s;
    }
    .topbar-search-newwin {
      flex: 0 0 auto;
      margin: 0;
      padding: 0.35rem 0.45rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-left: 1px solid #e2e8f0;
      border-radius: 0;
      background: transparent;
      color: #64748b;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .topbar-search-row:hover .topbar-search-newwin {
      color: #2563eb;
      border-left-color: #bfdbfe;
    }
    .topbar-search-newwin:hover,
    .topbar-search-newwin:focus-visible {
      background: rgba(37, 99, 235, 0.08);
      color: #1d4ed8;
      outline: none;
    }
    .topbar-search-row.is-hidden {
      display: none;
    }
    .topbar-search-empty {
      margin: 0;
      padding: 0.5rem 0.35rem;
      font-size: 0.78rem;
      color: #94a3b8;
    }
    html.embed-view .topbar-search-btn,
    html.embed-view .topbar-open-site-btn,
    html.embed-view .topbar-search-panel,
    html.embed-view .topbar-search-backdrop {
      display: none !important;
    }
    /* 본체: 좌측 + 메인 */
    .body-row { flex: 1; display: flex; min-height: 0; }
    /* 좌측: 문서 트리 + 하단 진입 링크 */
    .sidebar-column {
      flex: 0 0 var(--sidebar-w);
      width: var(--sidebar-w);
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      transition:
        flex-basis 0.22s ease,
        width 0.22s ease,
        opacity 0.2s ease;
    }
    .app.sidebar-collapsed .sidebar-column {
      flex-basis: 0;
      width: 0;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .sidebar {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0.75rem 0;
    }
    .sidebar-footer-panel {
      flex: 0 0 auto;
      padding: 0.65rem 0.75rem 0.85rem;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.22);
    }
    .sidebar-footer-panel-title {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #94a3b8;
      margin: 0 0 0.45rem;
      line-height: 1.35;
      word-break: keep-all;
    }
    .sidebar-site-select {
      display: block;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      margin: 0;
      padding: 0.4rem 0.45rem;
      font-size: 0.72rem;
      font-weight: 600;
      font-family: inherit;
      line-height: 1.25;
      color: #0f172a;
      background: #f1f5f9;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 6px;
      cursor: pointer;
    }
    .sidebar-site-select:hover {
      background: #fff;
      border-color: rgba(255, 255, 255, 0.4);
    }
    .sidebar-site-select:focus-visible {
      outline: 2px solid rgba(147, 197, 253, 0.95);
      outline-offset: 2px;
    }
    .sidebar-section { padding: 0.35rem 0.85rem; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.55; }
    /** 앱 전환 시 상단 표시: 표시 문자열로 만든 어두운 바탕 + 노란 볼드 (인라인 배경은 JS) */
    .sidebar-app-title {
      text-transform: none;
      letter-spacing: 0.04em;
      opacity: 1;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.55rem 0.75rem;
      margin: 0 0 0.35rem;
      border-radius: 6px;
      color: #facc15;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    /* 윈도우 탐색기형 트리 */
    .sidebar-tree-toolbar {
      padding: 0.35rem 0.65rem 0.55rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .sidebar-tree-toggle-all {
      display: block; width: 100%;
      padding: 0.42rem 0.6rem;
      margin: 0;
      font-size: 0.75rem; font-weight: 600; font-family: inherit;
      color: #e2e8f0;
      cursor: pointer;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.07);
      border-left: none;
    }
    .sidebar-tree-toggle-all:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.22);
    }
    .sidebar-tree-toggle-all:focus-visible {
      outline: 2px solid rgba(147, 197, 253, 0.9);
      outline-offset: 2px;
    }
    .sidebar-tree-node { margin: 0; }
    .sidebar-tree-node + .sidebar-tree-node {
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    .sidebar-group-toggle {
      display: flex; align-items: center; gap: 0.35rem;
      width: 100%; text-align: left;
      padding: 0.48rem 0.75rem 0.48rem 0.5rem; margin: 0;
      border: none; background: transparent;
      font-size: 0.74rem; font-weight: 700; letter-spacing: 0.03em;
      font-family: inherit;
      color: #94a3b8; cursor: pointer;
      border-left: 3px solid transparent;
    }
    .sidebar-group-toggle:hover {
      background: rgba(255, 255, 255, 0.06);
      color: #cbd5e1;
    }
    .sidebar-group-toggle:focus-visible {
      outline: 2px solid rgba(147, 197, 253, 0.9);
      outline-offset: -2px;
    }
    .sidebar-caret {
      display: inline-block;
      width: 0.95rem;
      flex-shrink: 0;
      text-align: center;
      font-size: 0.55rem;
      line-height: 1;
      color: #64748b;
      transform: rotate(-90deg);
      transition: transform 0.16s ease;
    }
    .sidebar-tree-node:not(.is-collapsed) .sidebar-caret {
      transform: rotate(0deg);
    }
    .sidebar-tree-children {
      padding-bottom: 0.2rem;
    }
    .sidebar-tree-node.is-collapsed .sidebar-tree-children {
      display: none;
    }
    .sidebar-tree-children button[data-doc] {
      display: block; width: 100%; text-align: left;
      padding: 0.5rem 0.85rem 0.5rem 1.55rem; margin: 0;
      border: none; background: transparent; color: inherit;
      font-size: 0.88rem; cursor: pointer;
      border-left: 3px solid transparent;
    }
    .sidebar-tree-children button[data-doc]:hover { background: var(--sidebar-hover); }
    .sidebar-tree-children button[data-doc].active {
      background: var(--sidebar-hover);
      border-left-color: var(--accent);
      color: #fff;
    }
    .sidebar-tree-children button[data-doc]:focus-visible {
      outline: 2px solid rgba(147, 197, 253, 0.9);
      outline-offset: -2px;
    }
    /* 접이식 사이드바: docs · 페이지 중첩 그룹 */
    .sidebar-tree-node--nested { margin: 0; border-top: none; }
    .sidebar-tree-node--nested .sidebar-group-toggle {
      padding-left: 1.5rem;
      font-weight: 600;
      font-size: 0.72rem;
      color: #a8b4c8;
    }
    .sidebar-tree-node--nested .sidebar-tree-children button[data-doc] {
      padding-left: 2.15rem;
    }
    .sidebar-tree-node--nested .sidebar-tree-node--nested .sidebar-group-toggle {
      padding-left: 2.1rem;
    }
    .sidebar-tree-node--nested .sidebar-tree-node--nested .sidebar-tree-children button[data-doc] {
      padding-left: 2.78rem;
    }
    /* 메인: 탭 + 내용 — min-height:0 으로 중첩 flex 에서 남은 높이를 #content/iframe 까지 전달 */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; background: #fff; }
    .tab-bar {
      flex: 0 0 auto;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      flex-wrap: nowrap;
      min-height: var(--tab-h);
      padding: 10px 0 0 8px;
      gap: 0;
      background: linear-gradient(180deg, #e2e8f0 0%, var(--tab-bar-bg) 100%);
      border-bottom: 2px solid var(--tab-edge);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
    }
    .tab-bar-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      flex-wrap: nowrap;
      gap: 2px;
      padding-right: 6px;
    }
    /* 좌측 사이드바: 열린 탭 모음 (전체 펼치기 위) */
    .sidebar-open-tabs-host {
      padding: 0.35rem 0.65rem 0.45rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .sidebar-open-tabs-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 5px;
    }
    .sidebar-open-tabs-row .open-tab-select {
      flex: 1;
      min-width: 0;
    }
    .open-tab-sort-bar {
      display: none;
      flex-direction: row;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;

    .content-wrap {

    /** 임베드 iframe 은 이 스택에만 두고 부모를 옮기지 않음(reparent 시 문서가 다시 로드되는 브라우저 대응) */

              loading: false,
              error: null,
              htmlEmbed: true
            });
          } else {
            tabs.push({ id: did, doc: doc, html: null, loading: true, error: null });
          }
        }
        activeId = focusId;

        function finishRestore() {
          syncSidebar();
          renderTabs();
          showContent();
          renderOpenTabSelect();
          applyOpenTabListPinnedState();
          syncOpenTabSortButtons();
          if (history.replaceState) history.replaceState(null, '', '#' + focusId);
          updateTabScrollState();
        }

        var pending = 0;
        for (var k = 0; k < tabs.length; k++) {
          var tab = tabs[k];
          if (tab.loading && tab.doc.file && !isHtmlFileDoc(tab.doc)) {
            pending++;
            (function (t) {
              fetch(absoluteHrefForRepoRelative(resolveRepoFilePath(t.doc.file)), { cache: 'no-store' })
                .then(function (r) {
                  if (!r.ok) throw new Error('HTTP ' + r.status + ' — ' + t.doc.file);
                  return r.text();
                })
                .then(function (text) {
                  t.html = renderMarkdown(text);
                  t.loading = false;
                  renderTabs();
                  if (activeId === t.id) showContent();
                  pending--;
                  if (pending === 0) finishRestore();
                })
                .catch(function (err) {
                  t.loading = false;
                  t.error = err.message || String(err);
                  renderTabs();
                  if (activeId === t.id) showContent();
                  pending--;
                  if (pending === 0) finishRestore();
                });
            })(tab);
          }
        }

        syncSidebar();
        renderTabs();
        showContent();
        renderOpenTabSelect();
        if (pending === 0) {
          finishRestore();
        }
      }

      function closeTab(docId, ev) {
        if (ev) ev.stopPropagation();
        var idx = -1;
        for (var i = 0; i < tabs.length; i++) if (tabs[i].id === docId) idx = i;
        if (idx < 0) return;
        disposeTabEmbedFrame(tabs[idx]);
        tabs.splice(idx, 1);
        if (activeId === docId) activeId = tabs.length ? tabs[Math.min(idx, tabs.length - 1)].id : null;
        if (activeId && history.replaceState) history.replaceState(null, '', '#' + activeId);
        else if (!activeId && history.replaceState) history.replaceState(null, '', location.pathname + location.search);
        syncSidebarModeFromActiveTab();
        renderTabs();
        showContent();
      }

      /** 우클릭한 탭만 남기고 나머지 탭 닫기 */
      function closeOtherTabs(keepId) {
        if (!keepId) return;
        var kept = null;
        for (var i = 0; i < tabs.length; i++) {
          if (tabs[i].id === keepId) {
            kept = tabs[i];
            break;
          }
        }
        if (!kept) return;
        for (var ci = 0; ci < tabs.length; ci++) {
          if (tabs[ci].id !== keepId) disposeTabEmbedFrame(tabs[ci]);
        }
        tabs = [kept];
        activeId = keepId;
        if (history.replaceState) history.replaceState(null, '', '#' + keepId);
        syncSidebarModeFromActiveTab();
        renderTabs();
        showContent();
      }

      function closeAllTabs() {
        for (var ai = 0; ai < tabs.length; ai++) disposeTabEmbedFrame(tabs[ai]);
        tabs = [];
        activeId = null;
        if (history.replaceState) history.replaceState(null, '', location.pathname + location.search);
        syncSidebar();
        syncTopNav();
        renderTabs();
        showContent();
      }

      function clearTabDragOverMarks(container) {
        if (!container) return;
        var nodes = container.querySelectorAll('.tab.drag-over');
        for (var i = 0; i < nodes.length; i++) nodes[i].classList.remove('drag-over');
      }

      function clearTabDragStyles(container) {
        if (!container) return;
        var nodes = container.querySelectorAll('.tab.dragging, .tab.drag-over');
        for (var i = 0; i < nodes.length; i++) {
          nodes[i].classList.remove('dragging', 'drag-over');
          nodes[i].removeAttribute('aria-grabbed');
        }
      }

      /** 드롭 대상 탭 앞으로 이동 (같은 위치면 무시) */
      function reorderTabsById(fromId, toId) {
        if (!fromId || !toId || fromId === toId) return;
        var fromIdx = -1;
        var toIdx = -1;
        for (var i = 0; i < tabs.length; i++) {
          if (tabs[i].id === fromId) fromIdx = i;
          if (tabs[i].id === toId) toIdx = i;
        }
        if (fromIdx < 0 || toIdx < 0) return;
        var item = tabs.splice(fromIdx, 1)[0];
        var insertAt = fromIdx < toIdx ? toIdx - 1 : toIdx;
        tabs.splice(insertAt, 0, item);
        syncSidebar();
        syncTopNav();
        renderTabs();
        showContent();
      }

      /** 탭 줄 끝(빈 영역)에 드롭 시 맨 뒤로 */
      function moveDraggedTabToEnd(fromId) {
        if (!fromId) return;
        var fromIdx = -1;
        for (var i = 0; i < tabs.length; i++) {
          if (tabs[i].id === fromId) {
            fromIdx = i;
            break;
          }
        }
        if (fromIdx < 0) return;
        var item = tabs.splice(fromIdx, 1)[0];
        tabs.push(item);
        syncSidebar();
        syncTopNav();
        renderTabs();
        showContent();
      }

      /** 열린 탭 순서 기준 이전(−1) / 다음(+1) 탭 활성화 */
      function navigateTabStep(delta) {
        if (!tabs.length) return;
        if (tabs.length === 1) return;
        var idx = -1;
        for (var i = 0; i < tabs.length; i++) {
          if (tabs[i].id === activeId) {
            idx = i;
            break;
          }
        }
        if (idx < 0) idx = 0;
        idx = (idx + delta + tabs.length) % tabs.length;
        activeId = tabs[idx].id;
        syncSidebarModeFromActiveTab();
        renderTabs();
        showContent();
      }

      var contextMenuTabId = null;

      function hideTabContextMenu() {
        var m = document.getElementById('tabContextMenu');
        if (!m) return;
        m.classList.remove('is-open');
        m.style.display = 'none';
        m.setAttribute('aria-hidden', 'true');
        contextMenuTabId = null;
      }

      function dismissFloatingMenus() {
        hideTabContextMenu();
      }

      function showTabContextMenu(clientX, clientY, tabId) {
        var m = document.getElementById('tabContextMenu');
        if (!m) return;
        contextMenuTabId = tabId;
        m.style.display = 'block';
        m.classList.add('is-open');
        m.setAttribute('aria-hidden', 'false');
        m.style.left = clientX + 'px';
        m.style.top = clientY + 'px';
        requestAnimationFrame(function () {
          var rect = m.getBoundingClientRect();
          var pad = 8;
          var x = clientX;
          var y = clientY;
          if (rect.right > window.innerWidth - pad) x = window.innerWidth - rect.width - pad;
          if (rect.bottom > window.innerHeight - pad) y = window.innerHeight - rect.height - pad;
          if (x < pad) x = pad;
          if (y < pad) y = pad;
          m.style.left = x + 'px';
          m.style.top = y + 'px';
        });
      }

      function initTabContextMenu() {
        var menu = document.getElementById('tabContextMenu');
        if (!menu) return;
        menu.addEventListener('click', function (e) {
          var btn = e.target.closest('button[data-action]');
          if (!btn) return;
          e.stopPropagation();
          e.preventDefault();
          var action = btn.getAttribute('data-action');
          var id = contextMenuTabId;
          dismissFloatingMenus();
          if (action === 'close-current' && id) closeTab(id);
          else if (action === 'close-others' && id) closeOtherTabs(id);
          else if (action === 'new-window' && id) openDocInNewWindow(id);
          else if (action === 'refresh-doc' && id) reloadTabDocument(id);
          else if (action === 'close-all') closeAllTabs();
        });
        document.addEventListener('click', function () {
          dismissFloatingMenus();
        });
        document.addEventListener('contextmenu', function (e) {
          if (menu.classList.contains('is-open') && !menu.contains(e.target)) {
            hideTabContextMenu();
          }
        });
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape') dismissFloatingMenus();
        });
        window.addEventListener('resize', dismissFloatingMenus);
        window.addEventListener('blur', dismissFloatingMenus);
      }

      function initTabKeyboardNav() {
        document.addEventListener('keydown', function (e) {
          if (e.target.closest('input, textarea, select, [contenteditable="true"]')) return;
          if (e.ctrlKey && !e.shiftKey && !e.altKey && (e.key === 'PageDown' || e.code === 'PageDown')) {
            e.preventDefault();
            navigateTabStep(1);
            return;
          }
          if (e.ctrlKey && !e.shiftKey && !e.altKey && (e.key === 'PageUp' || e.code === 'PageUp')) {
            e.preventDefault();
            navigateTabStep(-1);
            return;
          }
          if (e.altKey && !e.ctrlKey && e.key === 'ArrowRight') {
            e.preventDefault();
            navigateTabStep(1);
            return;
          }
          if (e.altKey && !e.ctrlKey && e.key === 'ArrowLeft') {
            e.preventDefault();
            navigateTabStep(-1);
            return;
          }
        });
      }

      function tabScrollStepPx() {
        var view = document.getElementById('tabScrollView');
        if (!view) return 220;
        var els = view.querySelectorAll('.tab');
        var gap = 2;
        if (els.length === 0) return 220;
        if (els.length === 1) return els[0].offsetWidth + gap;
        return els[0].offsetWidth + gap + els[1].offsetWidth + gap;
      }

      function updateTabScrollState() {
        var view = document.getElementById('tabScrollView');
        var prev = document.getElementById('tabScrollPrev');
        var next = document.getElementById('tabScrollNext');
        if (!view || !prev || !next) return;
        var overflow = view.scrollWidth - view.clientWidth > 2;
        prev.classList.toggle('is-visible', overflow);
        next.classList.toggle('is-visible', overflow);
        if (!overflow) {
          prev.disabled = true;
          next.disabled = true;
          return;
        }
        var maxScroll = Math.max(0, view.scrollWidth - view.clientWidth);
        prev.disabled = view.scrollLeft <= 2;
        next.disabled = view.scrollLeft >= maxScroll - 2;
      }

      function scrollTabsBy(delta) {
        var view = document.getElementById('tabScrollView');
        if (!view) return;
        view.scrollBy({ left: delta, behavior: 'smooth' });
      }

      function scrollActiveTabIntoView() {
        var view = document.getElementById('tabScrollView');
        if (!view) return;
        var active = view.querySelector('.tab.active');
        if (!active) return;
        active.scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
      }

      /** 열린 탭 목록용 표시 문자열 (사이드바 그룹 > 문서 라벨, 그룹 없으면 라벨만) */
      function openTabListDisplayLabel(doc) {
        if (!doc) return '';
        var g = doc.group;
        if (g == null || g === '') return doc.label;
        return g + ' > ' + doc.label;
      }

      /**
       * 네이티브 `<select>`는 좁은 폭에서 끝을 잘라 …가 붙으므로,
       * 잘릴 땐 경로를 빼고 `…` + 전체 메뉴명(라벨) 우선. 라벨만도 길면 라벨 끝만 유지.
       */
      function openTabListEllipsisStart(doc, maxChars) {
        var full = openTabListDisplayLabel(doc);
        if (!maxChars || full.length <= maxChars) return full;
        var label = doc.label || '';
        var ell = '\u2026';
        var budget = maxChars - ell.length;
        if (budget < 1) return ell;
        if (label.length <= budget) {
          return ell + label;
        }
        return ell + label.slice(label.length - budget);
      }

      /** 드롭다운·닫힌 셀렉트 폭에 맞춤 (한글 기준 대략 한 줄) */
      var OPEN_TAB_SELECT_OPTION_MAX_CHARS = 34;

      function compareTabsForOpenList(a, b) {
        var ga = a.doc.group || '';
        var gb = b.doc.group || '';
        var c = ga.localeCompare(gb, 'ko', { numeric: true, sensitivity: 'base' });
        if (c !== 0) return c;
        return a.doc.label.localeCompare(b.doc.label, 'ko', { numeric: true, sensitivity: 'base' });
      }

      /** 사이드바 열린 탭 `<select>` 동기화 */
      function renderOpenTabSelect() {
        var sel = document.getElementById('openTabSelect');
        if (!sel) return;
        sel.innerHTML = '';
        if (!tabs.length) {
          var opt0 = document.createElement('option');
          opt0.value = '';
          opt0.textContent = '열린 탭 없음';
          opt0.disabled = true;
          opt0.selected = true;
          sel.appendChild(opt0);
          sel.disabled = true;
          sel.removeAttribute('title');
          renderOpenTabPinnedList();
          return;
        }
        sel.disabled = false;
        var sorted = sortedTabsForOpenList();
        sorted.forEach(function (t) {
          var opt = document.createElement('option');
          opt.value = t.id;
          var fullLabel = openTabListDisplayLabel(t.doc);
          opt.textContent = openTabListEllipsisStart(t.doc, OPEN_TAB_SELECT_OPTION_MAX_CHARS);
          opt.setAttribute('title', fullLabel);
          sel.appendChild(opt);
        });
        if (activeId) sel.value = activeId;
        var activeDoc = null;
        for (var ti = 0; ti < tabs.length; ti++) {
          if (tabs[ti].id === activeId) {
            activeDoc = tabs[ti].doc;
            break;
          }
        }
        if (activeDoc) {
          sel.setAttribute('title', openTabListDisplayLabel(activeDoc) + ' · Ctrl+선택: 원본 파일 새 창');
        } else {
          sel.removeAttribute('title');
        }
        renderOpenTabPinnedList();
      }

      function sortedTabsForOpenList() {
        if (openTabListSortMode === 'tabs') return tabs.slice();
        return tabs.slice().sort(compareTabsForOpenList);
      }

      function syncOpenTabSortButtons() {
        var bTabs = document.getElementById('openTabSortTabsBtn');
        var bAlpha = document.getElementById('openTabSortAlphaBtn');
        if (bTabs) bTabs.classList.toggle('active', openTabListSortMode === 'tabs');
        if (bAlpha) bAlpha.classList.toggle('active', openTabListSortMode === 'alpha');
      }

      function setOpenTabListSortMode(mode) {
        if (mode !== 'tabs' && mode !== 'alpha') return;
        openTabListSortMode = mode;
        try {
          localStorage.setItem('intSmsMdOpenTabSort', mode);
        } catch (e) {}
        syncOpenTabSortButtons();
        renderOpenTabSelect();
      }

      function renderOpenTabPinnedList() {
        var panel = document.getElementById('openTabListPanel');
        if (!panel || !openTabListPinned) return;
        panel.innerHTML = '';
        if (!tabs.length) {
          var empty = document.createElement('div');
          empty.className = 'open-tab-list-empty';
          empty.textContent = '열린 탭 없음';
          panel.appendChild(empty);
          return;
        }
        sortedTabsForOpenList().forEach(function (t) {
          var b = document.createElement('button');
          b.type = 'button';
          b.className = 'open-tab-list-item' + (t.id === activeId ? ' active' : '');
          b.setAttribute('data-tab-id', t.id);
          var fullLabel = openTabListDisplayLabel(t.doc);
          b.title = fullLabel + ' · Ctrl+클릭: 원본 파일 새 창';
          var clip = document.createElement('span');
          clip.className = 'open-tab-list-item-text-clip';
          var inner = document.createElement('span');
          inner.className = 'open-tab-list-item-ltr';
          inner.textContent = fullLabel;
          clip.appendChild(inner);
          b.appendChild(clip);
          b.addEventListener('click', function (e) {
            if (e.ctrlKey || e.metaKey) {
              e.preventDefault();
              openDocStandalonePopout(t.id);
              return;
            }
            if (t.id === activeId) return;
            activeId = t.id;
            syncSidebarModeFromActiveTab();
            renderTabs();
            showContent();
          });
          panel.appendChild(b);
        });
      }

      function setOpenTabListPinned(on) {
        openTabListPinned = !!on;
        try {
          localStorage.setItem('intSmsMdOpenTabListPinned', openTabListPinned ? '1' : '0');
        } catch (e) {}
        applyOpenTabListPinnedState();
      }

      function applyOpenTabListPinnedState() {
        var host = document.getElementById('sidebarOpenTabsHost');
        var pin = document.getElementById('openTabListPinBtn');
        var panel = document.getElementById('openTabListPanel');
        var on = openTabListPinned;
        if (host) host.classList.toggle('is-pinned', on);
        if (pin) {
          pin.setAttribute('aria-pressed', on ? 'true' : 'false');
          pin.title = on ? '목록 고정 해제' : '열린 탭 목록을 펼친 채로 유지';
          pin.setAttribute('aria-label', on ? '열린 탭 목록 고정 해제' : '열린 탭 목록 펼침 고정');
        }
        if (panel) {
          if (on) panel.removeAttribute('hidden');
          else panel.setAttribute('hidden', '');
        }
        syncOpenTabSortButtons();
        renderOpenTabSelect();
      }

      function initOpenTabSelect() {
        var sel = document.getElementById('openTabSelect');
        if (!sel || sel.getAttribute('data-bound') === '1') return;
        sel.setAttribute('data-bound', '1');
        if (!initOpenTabSelect._modifierSync) {
          initOpenTabSelect._modifierSync = true;
          document.addEventListener(
            'keydown',
            function (e) {
              openTabSelectModifiers = !!(e.ctrlKey || e.metaKey);
            },
            true
          );
          document.addEventListener(
            'keyup',
            function (e) {
              openTabSelectModifiers = !!(e.ctrlKey || e.metaKey);
            },
            true
          );
        }
        sel.addEventListener('change', function () {
          var id = sel.value;
          if (openTabSelectModifiers && id && findDoc(id)) {
            openDocStandalonePopout(id);
            sel.value = activeId || '';
            return;
          }
          if (!id || id === activeId) return;
          activeId = id;
          syncSidebarModeFromActiveTab();
          renderTabs();
          showContent();
        });
      }

      function renderTabs() {
        var strip = document.getElementById('tabScrollView');
        if (!strip) return;
        strip.innerHTML = '';
        if (!tabs.length) {
          updateTabScrollState();
          renderOpenTabSelect();
          return;
        }
        tabs.forEach(function (t) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'tab' + (t.id === activeId ? ' active' : '');
          btn.setAttribute('role', 'tab');
          btn.setAttribute('aria-selected', t.id === activeId ? 'true' : 'false');
          btn.setAttribute('data-tab-id', t.id);
          btn.setAttribute('title', '클릭: 활성화 · Ctrl+클릭: 원본 파일 새 창 · 드래그: 순서 변경');
          btn.draggable = true;
          var span = document.createElement('span');
          span.textContent = t.doc.label;
          span.style.overflow = 'hidden';
          span.style.textOverflow = 'ellipsis';
          span.setAttribute('draggable', 'false');
          span.style.userSelect = 'none';
          btn.appendChild(span);
          var x = document.createElement('button');
          x.type = 'button';
          x.className = 'close';
          x.setAttribute('aria-label', '탭 닫기');
          x.setAttribute('draggable', 'false');
          x.innerHTML = '&times;';
          x.onclick = function (e) { closeTab(t.id, e); };
          x.oncontextmenu = function (e) { e.stopPropagation(); };
          btn.oncontextmenu = function (e) {
            e.preventDefault();
            e.stopPropagation();
            showTabContextMenu(e.clientX, e.clientY, t.id);
          };
          btn.addEventListener('dragstart', function (e) {
            if (e.target.closest && e.target.closest('.close')) {
              e.preventDefault();
              return;
            }
            dragTabSourceId = t.id;
            try {
              e.dataTransfer.setData('text/plain', t.id);
            } catch (err) {}
            e.dataTransfer.effectAllowed = 'move';
            btn.classList.add('dragging');
            btn.setAttribute('aria-grabbed', 'true');
          });
          btn.addEventListener('dragend', function () {
            clearTabDragStyles(strip);
            dragTabSourceId = null;
            btn.removeAttribute('aria-grabbed');
            suppressTabClickUntil = Date.now() + 200;
          });
          btn.addEventListener('dragover', function (e) {
            if (!dragTabSourceId || dragTabSourceId === t.id) return;
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            clearTabDragOverMarks(strip);
            btn.classList.add('drag-over');
          });
          btn.addEventListener('dragleave', function (e) {
            if (btn.contains(e.relatedTarget)) return;
            btn.classList.remove('drag-over');
          });
          btn.addEventListener('drop', function (e) {
            e.preventDefault();
            e.stopPropagation();
            var fromId = '';
            try {
              fromId = e.dataTransfer.getData('text/plain');
            } catch (err2) {}
            if (!fromId) fromId = dragTabSourceId;
            clearTabDragStyles(strip);
            dragTabSourceId = null;
            suppressTabClickUntil = Date.now() + 200;
            reorderTabsById(fromId, t.id);
          });
          btn.onclick = function (e) {
            if (Date.now() < suppressTabClickUntil) return;
            if (e.target === x || (e.target.closest && e.target.closest('.close'))) return;
            if (e.ctrlKey || e.metaKey) {
              e.preventDefault();
              openDocStandalonePopout(t.id);
              return;
            }
            if (t.id === activeId) return;
            activeId = t.id;
            syncSidebarModeFromActiveTab();
            renderTabs();
            showContent();
          };
          strip.appendChild(btn);
        });
        renderOpenTabSelect();
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            updateTabScrollState();
            scrollActiveTabIntoView();
          });
        });
      }

      function initTabScrollControls() {
        var view = document.getElementById('tabScrollView');
        var prev = document.getElementById('tabScrollPrev');
        var next = document.getElementById('tabScrollNext');
        if (!view || !prev || !next) return;
        prev.addEventListener('click', function () {
          scrollTabsBy(-tabScrollStepPx());
        });
        next.addEventListener('click', function () {
          scrollTabsBy(tabScrollStepPx());
        });
        view.addEventListener('scroll', function () {
          updateTabScrollState();
          dismissFloatingMenus();
        });
        view.addEventListener('dragover', function (e) {
          e.preventDefault();
          if (dragTabSourceId) e.dataTransfer.dropEffect = 'move';
          if (!e.target.closest || !e.target.closest('.tab')) {
            clearTabDragOverMarks(view);
          }
        });
        view.addEventListener('drop', function (e) {
          if (e.target.closest && e.target.closest('.tab')) return;
          e.preventDefault();
          var fromId = '';
          try {
            fromId = e.dataTransfer.getData('text/plain');
          } catch (err) {}
          if (!fromId) fromId = dragTabSourceId;
          if (!fromId) return;
          clearTabDragStyles(view);
          dragTabSourceId = null;
          suppressTabClickUntil = Date.now() + 200;
          moveDraggedTabToEnd(fromId);
        });
        window.addEventListener('resize', function () {
          updateTabScrollState();
        });
      }

      function showLoading() {
        document.getElementById('emptyState').style.display = 'none';
        hideEmbedStackVisually();
        var c = document.getElementById('content');
        var wrap = document.getElementById('contentWrap');
        if (wrap) wrap.classList.remove('content-wrap--embed');
        c.classList.remove('markdown-body--embed');
        c.style.display = 'block';
        c.innerHTML = '<div class="loading">불러오는 중…</div>';
      }

      function isSourceExplainDoc(doc) {
        return doc && doc.group === '50.소스설명';
      }

      function isSourceFileSectionH2(el) {
        return el && el.tagName === 'H2' && el.id && /^file-/.test(el.id);
      }

      /** `#content` 직계 자식만 사용: `h2#file-*` 앞은 개요, 이후는 파일(또는 설정) 블록 */
      function collectSourceFileBlocks(children) {
        var sections = [];
        var i = 0;
        while (i < children.length && !isSourceFileSectionH2(children[i])) {
          i++;
        }
        var intro = children.slice(0, i);
        if (intro.length) {
          sections.push({ key: 'intro', label: '개요', nodes: intro });
        }
        while (i < children.length) {
          if (!isSourceFileSectionH2(children[i])) {
            i++;
            continue;
          }
          var h2 = children[i];
          var block = [h2];
          i++;
          while (i < children.length && !isSourceFileSectionH2(children[i])) {
            block.push(children[i]);
            i++;
          }
          sections.push({ key: h2.id, label: (h2.textContent || '').trim() || h2.id, nodes: block });
        }
        return sections;
      }

      function ensureValidSourceSectionKey(tab, sections) {
        var keys = {};
        for (var si = 0; si < sections.length; si++) keys[sections[si].key] = true;
        if (tab.sourceSectionKey && keys[tab.sourceSectionKey]) return;
        tab.sourceSectionKey = keys.intro ? 'intro' : sections[0] ? sections[0].key : 'intro';
      }

      function scrollContentWrapToTop() {
        var wrap = document.getElementById('contentWrap');
        if (wrap) wrap.scrollTop = 0;
      }

      function applySourceExplainSectionVisibility(container, tab) {
        var navHost = container.querySelector('.source-file-nav-host');
        if (!navHost || !navHost._sections) return;
        var sections = navHost._sections;
        var key = tab.sourceSectionKey;
        var ok = false;
        for (var i = 0; i < sections.length; i++) {
          if (sections[i].key === key) ok = true;
        }
        if (!ok && sections.length) {
          tab.sourceSectionKey = sections[0].key;
          key = tab.sourceSectionKey;
        }
        for (var j = 0; j < sections.length; j++) {
          var sec = sections[j];
          var on = sec.key === key;
          for (var k = 0; k < sec.nodes.length; k++) {
            sec.nodes[k].classList.toggle('source-section-hidden', !on);
          }
        }
        var btns = navHost.querySelectorAll('.source-file-nav-btn');
        for (var b = 0; b < btns.length; b++) {
          var btn = btns[b];
          btn.classList.toggle('active', btn.getAttribute('data-section-key') === key);
          btn.setAttribute('aria-selected', btn.getAttribute('data-section-key') === key ? 'true' : 'false');
        }
      }

      function buildSourceExplainFileNav(container, tab, blocks) {
        ensureValidSourceSectionKey(tab, blocks);
        var navHost = document.createElement('div');
        navHost.className = 'source-file-nav-host';
        navHost._sections = blocks;
        var nav = document.createElement('div');
        nav.className = 'source-file-nav';
        nav.setAttribute('role', 'tablist');
        nav.setAttribute('aria-label', '문서 내 파일·절 이동');
        for (var i = 0; i < blocks.length; i++) {
          (function (sec) {
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'source-file-nav-btn';
            btn.setAttribute('role', 'tab');
            btn.setAttribute('data-section-key', sec.key);
            var lab = sec.label;
            if (lab.length > 48) lab = lab.slice(0, 46) + '…';
            btn.textContent = lab;
            btn.title = sec.label;
            btn.addEventListener('click', function () {
              tab.sourceSectionKey = sec.key;
              applySourceExplainSectionVisibility(container, tab);
              scrollContentWrapToTop();
            });
            nav.appendChild(btn);
          })(blocks[i]);
        }
        navHost.appendChild(nav);
        container.insertBefore(navHost, container.firstChild);
        applySourceExplainSectionVisibility(container, tab);
      }

      function normalizeEmbedPageUrl(u) {
        try {
          return new URL(u, window.location.href).href.replace(/\/$/, '');
        } catch (e1) {
          return String(u || '');
        }
      }

      function getEmbedStack() {
        return document.getElementById('embedStack');
      }

      function hideEmbedStackVisually() {
        var stack = getEmbedStack();
        if (!stack) return;
        stack.hidden = true;
        stack.classList.remove('is-active');
        stack.setAttribute('aria-hidden', 'true');
      }

      /** 스택 안 iframe 은 부모를 바꾸지 않고, 활성 탭 것만 보이게 함 */
      function syncEmbedStackVisibility(activeEmbedTab) {
        var stack = getEmbedStack();
        if (!stack) return;
        var k;
        for (k = 0; k < tabs.length; k++) {
          var tb = tabs[k];
          if (!tb.htmlEmbed || !tb._embedFrame) continue;
          var fr = tb._embedFrame;
          if (fr.parentNode !== stack) stack.appendChild(fr);
          var isOn = activeEmbedTab && tb.id === activeEmbedTab.id;
          fr.classList.toggle('is-embed-visible', isOn);
          fr.classList.toggle('is-embed-hidden', !isOn);
        }
      }

      function disposeTabEmbedFrame(tab) {
        if (!tab || !tab._embedFrame) return;
        var el = tab._embedFrame;
        try {
          el.src = 'about:blank';
        } catch (eDis) {}
        if (el.parentNode) el.parentNode.removeChild(el);
        tab._embedFrame = null;
      }

      function showContent() {
        var empty = document.getElementById('emptyState');
        var c = document.getElementById('content');
        var wrap = document.getElementById('contentWrap');
        var stack = getEmbedStack();
        if (!activeId || !tabs.length) {
          empty.style.display = 'block';
          c.style.display = 'none';
          hideEmbedStackVisually();
          while (c.firstChild) c.removeChild(c.firstChild);
          if (wrap) wrap.classList.remove('content-wrap--embed');
          c.classList.remove('markdown-body--embed');
          return;
        }
        empty.style.display = 'none';
        var tab = null;
        for (var i = 0; i < tabs.length; i++) if (tabs[i].id === activeId) tab = tabs[i];
        if (!tab) return;
        if (wrap) wrap.classList.remove('content-wrap--embed');
        c.classList.remove('markdown-body--embed');
        if (tab.loading) {
          hideEmbedStackVisually();
          c.style.display = 'block';
          c.innerHTML = '<div class="loading">불러오는 중…</div>';
          return;
        }
        if (tab.error) {
          hideEmbedStackVisually();
          c.style.display = 'block';
          c.innerHTML = '<div class="error"><strong>로드 실패</strong><br/>' + escapeHtml(tab.error) +
            '<div class="hint"><strong>로컬에서 file:// 로 열면</strong> 브라우저가 다른 파일을 읽지 못합니다. ' +
            '이 폴더에서 HTTP 서버를 띄운 뒤 viewer.html 을 여세요.<br/>' +
            '예: <code>python -m http.server 8765</code> → <code>http://localhost:8765/viewer.html</code></div></div>';
          return;
        }
        if (tab.htmlEmbed && tab.doc && tab.doc.file) {
          if (wrap) wrap.classList.add('content-wrap--embed');
          c.style.display = 'none';
          if (stack) {
            stack.hidden = false;
            stack.classList.add('is-active');
            stack.setAttribute('aria-hidden', 'false');
          }
          var srcHtml = absoluteHrefForRepoRelative(resolveEmbedHtmlFile(tab.doc.file));
          var wantNorm = normalizeEmbedPageUrl(srcHtml);
          if (tab._embedFrame) {
            var fr = tab._embedFrame;
            var curNorm = normalizeEmbedPageUrl(fr.getAttribute('src') || fr.src || '');
            if (curNorm !== wantNorm) disposeTabEmbedFrame(tab);
          }
          if (!tab._embedFrame && stack) {
            var ifr = document.createElement('iframe');
            ifr.className = 'app-embed-frame content-html-embed is-embed-hidden';
            ifr.setAttribute('src', srcHtml);
            ifr.setAttribute('title', tab.doc.label || '');
            tab._embedFrame = ifr;
            stack.appendChild(ifr);
            scrollContentWrapToTop();
          }
          syncEmbedStackVisibility(tab);
          return;
        }
        hideEmbedStackVisually();
        c.style.display = 'block';
        c.innerHTML = tab.html;
        if (isSourceExplainDoc(tab.doc)) {
          var blocks = collectSourceFileBlocks(Array.prototype.slice.call(c.children));
          var hasFileSections = false;
          for (var bi = 0; bi < blocks.length; bi++) {
            if (blocks[bi].key !== 'intro') {
              hasFileSections = true;
              break;
            }
          }
          if (hasFileSections && blocks.length) {
            buildSourceExplainFileNav(c, tab, blocks);
          }
        }
        requestAnimationFrame(function () {
          runMermaid(c);
        });
      }

      function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function syncSidebarToggleAllLabel(nav) {
        var btn = document.getElementById('sidebarToggleAll');
        if (!btn || !nav) return;
        var nodes = nav.querySelectorAll('.sidebar-tree-node');
        if (!nodes.length) {
          btn.textContent = '전체 펼치기';
          return;
        }
        var allExpanded = Array.from(nodes).every(function (n) {
          return !n.classList.contains('is-collapsed');
        });
        btn.textContent = allExpanded ? '전체 접기' : '전체 펼치기';
      }

      function expandSidebarGroupForActiveDoc(nav, docId) {
        if (!nav || !docId) return;
        var docBtn = nav.querySelector('button[data-doc="' + docId + '"]');
        if (!docBtn) return;
        var el = docBtn.parentElement;
        while (el && el !== nav) {
          if (el.classList && el.classList.contains('sidebar-tree-node')) {
            el.classList.remove('is-collapsed');
            var head = el.firstElementChild;
            if (head && head.classList && head.classList.contains('sidebar-group-toggle')) {
              head.setAttribute('aria-expanded', 'true');
            }
          }
          el = el.parentElement;
        }
      }

      function syncSidebar() {
        var nav = document.getElementById('sidebar');
        var btns = nav.querySelectorAll('button[data-doc]');
        btns.forEach(function (b) {
          b.classList.toggle('active', b.getAttribute('data-doc') === activeId);
        });
        expandSidebarGroupForActiveDoc(nav, activeId);
        syncSidebarToggleAllLabel(nav);
      }

      function initSidebarToggle() {
        var app = document.querySelector('.app');
        var btn = document.getElementById('sidebarToggleBtn');
        if (!app || !btn) return;
        function applyCollapsed(collapsed) {
          app.classList.toggle('sidebar-collapsed', collapsed);
          btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
          var label = collapsed ? '문서 목록 패널 펼치기' : '문서 목록 패널 접기';
          btn.setAttribute('aria-label', label);
          btn.title = label;
        }
        var startCollapsed = false;
        try {
          startCollapsed = localStorage.getItem('intSmsMdSidebarCollapsed') === '1';
        } catch (e) {}
        applyCollapsed(startCollapsed);
        btn.addEventListener('click', function () {
          var collapsed = !app.classList.contains('sidebar-collapsed');
          applyCollapsed(collapsed);
          try {
            localStorage.setItem('intSmsMdSidebarCollapsed', collapsed ? '1' : '0');
          } catch (e2) {}
          requestAnimationFrame(function () {
            updateTabScrollState();
          });
        });
      }

      /** 상단 앱 선택: value가 비어 있는 옵션(선택…)은 앞에 두고, 나머지는 가나다(한국어 로케일) 정렬 */
      function sortTopNavSelectOptions(sel) {
        if (!sel || sel.disabled) return;
        var opts = Array.prototype.slice.call(sel.options, 0);
        if (opts.length <= 1) return;
        var head = [];
        var tail = [];
        var i;
        for (i = 0; i < opts.length; i++) {
          if (opts[i].value === '') head.push(opts[i]);
          else tail.push(opts[i]);
        }
        tail.sort(function (a, b) {
          return a.text.localeCompare(b.text, 'ko', { sensitivity: 'base', numeric: true });
        });
        while (sel.options.length) sel.remove(0);
        for (i = 0; i < head.length; i++) sel.appendChild(head[i]);
        for (i = 0; i < tail.length; i++) sel.appendChild(tail[i]);
      }

      function navigateTopbarApp(mode, firstDocId) {
        sidebarMode = mode;
        buildSidebarForApp(mode);
        syncSidebar();
        syncTopNav();
        openTab(firstDocId);
        var nav = document.getElementById('sidebar');
        var first = nav && nav.querySelector('button[data-doc]');
        if (first) first.focus();
      }

      /**
       * 상단 5개 select 중 값이 있는 항목마다 해당 앱 폴더(index)를 새 창으로 엽니다.
       * 같은 URL은 한 번만 엽니다.
       */
      function openTopNavSelectionsInNewWindows() {
        var cfg = window.MAIN_FRAME_TOP_NAV_SELECTS || [];
        var docs = window.MAIN_FRAME_DOCS || [];
        var ids = [];
        for (var c = 0; c < cfg.length; c++) {
          if (!cfg[c].disabled && cfg[c].id) ids.push(cfg[c].id);
        }
        var seen = Object.create(null);
        for (var i = 0; i < ids.length; i++) {
          var sel = document.getElementById(ids[i]);
          if (!sel || sel.disabled) continue;
          var v = String(sel.value || '').trim();
          if (!v) continue;
          // NAV_BY_APP → DOCS 에서 실제 file 경로 조회 (ec_v26/ 등 비표준 경로 대응)
          var navEntry = NAV_BY_APP[v];
          var filePath = v;
          if (navEntry && navEntry.docId) {
            for (var di = 0; di < docs.length; di++) {
              if (docs[di].id === navEntry.docId && docs[di].file) {
                filePath = docs[di].file;
                break;
              }
            }
          }
          var url = absoluteHrefForRepoRelative(resolveEmbedHtmlFile(filePath));
          if (!url || seen[url]) continue;
          seen[url] = true;
          window.open(url, '_blank', 'noopener,noreferrer');
        }
      }

      function initTopNavOpenSite() {
        var btn = document.getElementById('topNavOpenSiteBtn');
        if (!btn) return;
        btn.addEventListener('click', function () {
          openTopNavSelectionsInNewWindows();
        });
      }

      function initTopNav() {
        var selCompany = document.getElementById('topNavSelectCompany');
        var selPrep = document.getElementById('topNavSelectPrep');
        var selWork = document.getElementById('topNavSelectWork');
        if (!selCompany || !selPrep || !selWork) return;

        sortTopNavSelectOptions(selCompany);
        sortTopNavSelectOptions(selPrep);
        sortTopNavSelectOptions(selWork);

        function onTopNavAppChange() {
          var v = this.value;
          if (!v) return;
          var nav = NAV_BY_APP[v];
          if (nav) navigateTopbarApp(nav.mode, nav.docId);
        }

        selCompany.addEventListener('change', onTopNavAppChange);
        selPrep.addEventListener('change', onTopNavAppChange);
        selWork.addEventListener('change', onTopNavAppChange);

        syncTopNav();
      }

      /** 상단 검색: 회사제품 | 준비중 | 작업중 | 서비스중 구역 + 키워드 필터 */
      function initTopNavSearch() {
        var btn = document.getElementById('topNavSearchBtn');
        var panel = document.getElementById('topNavSearchPanel');
        var backdrop = document.getElementById('topNavSearchBackdrop');
        var input = document.getElementById('topNavSearchInput');
        var closeBtn = document.getElementById('topNavSearchClose');
        var body = document.getElementById('topNavSearchBody');
        if (!btn || !panel || !backdrop || !input || !closeBtn || !body) return;

        var SECTIONS = buildTopNavSearchSections();

        SECTIONS.forEach(function (sec) {
          sec.items.sort(function (a, b) {
            return a.label.localeCompare(b.label, 'ko', { sensitivity: 'base', numeric: true });
          });
        });

        while (body.firstChild) body.removeChild(body.firstChild);
        SECTIONS.forEach(function (sec) {
          var secEl = document.createElement('section');
          secEl.className = 'topbar-search-section';
          var h = document.createElement('h3');
          h.className = 'topbar-search-section-title';
          h.id = '';
          h.textContent = sec.key;
          secEl.appendChild(h);
          if (sec.items.length === 0) {
            var p = document.createElement('p');
            p.className = 'topbar-search-empty';
            p.textContent = '항목 없음';
            secEl.appendChild(p);
          } else {
            var list = document.createElement('div');
            list.className = 'topbar-search-items';
            sec.items.forEach(function (it) {
              var row = document.createElement('div');
              row.className = 'topbar-search-row';
              row.setAttribute('data-mode', it.mode);
              row.setAttribute('data-doc', it.docId);
              row.setAttribute('data-app', it.label);
              row.setAttribute('data-file', it.file || it.label);
              row.setAttribute('data-kw', (it.label + ' ' + it.mode).toLowerCase());
              var b = document.createElement('button');
              b.type = 'button';
              b.className = 'topbar-search-item';
              b.textContent = it.label;
              var nw = document.createElement('button');
              nw.type = 'button';
              nw.className = 'topbar-search-newwin';
              nw.setAttribute('aria-label', '새 창에서 열기');
              nw.setAttribute('title', '새 창에서 열기');
              nw.innerHTML =
                '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';
              row.appendChild(b);
              row.appendChild(nw);
              list.appendChild(row);
            });
            secEl.appendChild(list);
            var noMatch = document.createElement('p');
            noMatch.className = 'topbar-search-no-match';
            noMatch.textContent = '검색 결과 없음';
            secEl.appendChild(noMatch);
          }
          body.appendChild(secEl);
        });

        function applyTopNavSearchFilter() {
          var q = (input.value || '').trim().toLowerCase();
          body.querySelectorAll('.topbar-search-row').forEach(function (el) {
            var hay = el.getAttribute('data-kw') || '';
            var show = !q || hay.indexOf(q) !== -1;
            el.classList.toggle('is-hidden', !show);
          });
          body.querySelectorAll('.topbar-search-section').forEach(function (secEl) {
            var list = secEl.querySelector('.topbar-search-items');
            var noMatch = secEl.querySelector('.topbar-search-no-match');
            if (!list || !noMatch) return;
            var any = list.querySelector('.topbar-search-row:not(.is-hidden)');
            noMatch.style.display = q && !any ? 'block' : 'none';
          });
        }

        function openPanel() {
          panel.classList.add('is-open');
          panel.setAttribute('aria-hidden', 'false');
          backdrop.classList.add('is-open');
          btn.setAttribute('aria-expanded', 'true');
          input.value = '';
          body.querySelectorAll('.topbar-search-row').forEach(function (el) {
            el.classList.remove('is-hidden');
          });
          body.querySelectorAll('.topbar-search-no-match').forEach(function (el) {
            el.style.display = 'none';
          });
          applyTopNavSearchFilter();
          setTimeout(function () {
            input.focus();
          }, 10);
        }

        function closePanel() {
          panel.classList.remove('is-open');
          panel.setAttribute('aria-hidden', 'true');
          backdrop.classList.remove('is-open');
          btn.setAttribute('aria-expanded', 'false');
          btn.focus();
        }

        btn.addEventListener('click', function () {
          if (panel.classList.contains('is-open')) closePanel();
          else openPanel();
        });
        backdrop.addEventListener('click', closePanel);
        closeBtn.addEventListener('click', closePanel);
        input.addEventListener('input', applyTopNavSearchFilter);
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && panel.classList.contains('is-open')) {
            e.preventDefault();
            closePanel();
          }
        });
        body.addEventListener('click', function (e) {
          var nw = e.target.closest('.topbar-search-newwin');
          if (nw) {
            e.preventDefault();
            var rowNw = nw.closest('.topbar-search-row');
            var appKey = rowNw && (rowNw.getAttribute('data-file') || rowNw.getAttribute('data-app'));
            if (appKey) {
              var urlNw = absoluteHrefForRepoRelative(resolveEmbedHtmlFile(appKey));
              if (urlNw) window.open(urlNw, '_blank', 'noopener,noreferrer');
            }
            closePanel();
            return;
          }
          var t = e.target.closest('.topbar-search-item');
          if (!t) return;
          var row = t.closest('.topbar-search-row');
          var mode = row && row.getAttribute('data-mode');
          var docId = row && row.getAttribute('data-doc');
          if (mode && docId) {
            navigateTopbarApp(mode, docId);
            closePanel();
          }
        });
      }

      function syncSidebarSiteNavSelect() {
        var sel = document.getElementById('sidebarSiteNav');
        if (!sel) return;
        function pathLeaf() {
          var p = location.pathname || '';
          var q = p.lastIndexOf('/');
          var name = q >= 0 ? p.slice(q + 1) : p;
          return (name || '').toLowerCase();
        }
        var leaf = pathLeaf();
        var opts = sel.querySelectorAll('option');
        var i;
        var matched = false;
        for (i = 0; i < opts.length; i++) {
          if (opts[i].value.toLowerCase() === leaf) {
            sel.selectedIndex = i;
            matched = true;
            break;
          }
        }
        if (!matched) {
          for (i = 0; i < opts.length; i++) {
            if (opts[i].value.toLowerCase() === 'mainframe.html') {
              sel.selectedIndex = i;
              break;
            }
          }
        }
      }

      function initSidebarSiteNav() {
        var sel = document.getElementById('sidebarSiteNav');
        if (!sel) return;
        syncSidebarSiteNavSelect();
        sel.addEventListener('change', function () {
          var v = sel.value;
          if (!v) return;
          var abs = absoluteHrefForRepoRelative(resolveEmbedHtmlFile(v));
          if (abs) {
            window.open(abs, '_blank', 'noopener,noreferrer');
          }
          syncSidebarSiteNavSelect();
        });

        var sel = document.getElementById('sidebarUsefulSites');

          var v = sel.value;
          if (!v) return;

          sel.selectedIndex = 0;

      function getOpenTabSelectEl() {
        var sel = document.getElementById('openTabSelect');
        if (!sel) {
          sel = document.createElement('select');
          sel.id = 'openTabSelect';
          sel.className = 'open-tab-select';
          sel.setAttribute('aria-label', '열린 탭 선택');
