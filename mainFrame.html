        return sel;
      }

      var PIN_SVG_UNPIN =
        '<svg class="icon-unpin" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M12 15v2"/><path d="M8 11V7a4 4 0 0 1 7.7-1.5"/></svg>';
      var PIN_SVG_PIN =
        '<svg class="icon-pin" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M12 15v2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>';
      var SORT_SVG_TABS =
        '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="5" cy="7" r="1.5" fill="currentColor" stroke="none"/><circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="5" cy="17" r="1.5" fill="currentColor" stroke="none"/><path d="M9 7h11M9 12h8M9 17h13"/></svg>';
      var SORT_SVG_ALPHA =
        '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.5 17l2.2-9h.6l2.2 9"/><path d="M7.6 13.5h3.6"/><path d="M15.5 9v8M14 11.5h3"/></svg>';

      function buildOpenTabSortBar() {
        var bar = document.createElement('div');
        bar.id = 'openTabSortBar';
        bar.className = 'open-tab-sort-bar';
        bar.setAttribute('role', 'group');
        bar.setAttribute('aria-label', '열린 탭 목록 정렬 기준');
        var btnTabs = document.createElement('button');
        btnTabs.type = 'button';
        btnTabs.id = 'openTabSortTabsBtn';
        btnTabs.className = 'open-tab-sort-btn';
        btnTabs.title = '열린 탭 순서';
        btnTabs.setAttribute('aria-label', '열린 탭 순서로 정렬');
        btnTabs.innerHTML = SORT_SVG_TABS;
        var btnAlpha = document.createElement('button');
        btnAlpha.type = 'button';
        btnAlpha.id = 'openTabSortAlphaBtn';
        btnAlpha.className = 'open-tab-sort-btn';
        btnAlpha.title = '가나다순 (기본)';
        btnAlpha.setAttribute('aria-label', '가나다순으로 정렬');
        btnAlpha.innerHTML = SORT_SVG_ALPHA;
        if (bar.getAttribute('data-sort-bound') !== '1') {
          bar.setAttribute('data-sort-bound', '1');
          btnTabs.addEventListener('click', function () {
            setOpenTabListSortMode('tabs');
          });
          btnAlpha.addEventListener('click', function () {
            setOpenTabListSortMode('alpha');
          });
        }
        bar.appendChild(btnTabs);
        bar.appendChild(btnAlpha);
        return bar;
      }

      function ensureOpenTabSortBarInserted(host) {
        if (document.getElementById('openTabSortBar')) return;
        var panel = document.getElementById('openTabListPanel');
        if (!panel || panel.parentNode !== host) return;
        host.insertBefore(buildOpenTabSortBar(), panel);
      }

      function ensureOpenTabsHostLayout(host) {
        if (host.querySelector('.sidebar-open-tabs-row')) {
          ensureOpenTabSortBarInserted(host);
          return;
        }
        while (host.firstChild) host.removeChild(host.firstChild);
        var sel = getOpenTabSelectEl();
        var row = document.createElement('div');
        row.className = 'sidebar-open-tabs-row';
        var pin = document.createElement('button');
        pin.type = 'button';
        pin.className = 'open-tab-pin-btn';
        pin.id = 'openTabListPinBtn';
        pin.setAttribute('aria-pressed', 'false');
        pin.setAttribute('aria-label', '열린 탭 목록 펼침 고정');
        pin.title = '열린 탭 목록을 펼친 채로 유지';
        pin.innerHTML = PIN_SVG_UNPIN + PIN_SVG_PIN;
        pin.addEventListener('click', function () {
          setOpenTabListPinned(!openTabListPinned);
        });
        var sortBar = buildOpenTabSortBar();
        var panel = document.createElement('div');
        panel.id = 'openTabListPanel';
        panel.className = 'open-tab-list-panel';
        panel.hidden = true;
        row.appendChild(sel);
        row.appendChild(pin);
        host.appendChild(row);
        host.appendChild(sortBar);
        host.appendChild(panel);
      }

      function getSidebarOpenTabHost() {
        var host = document.getElementById('sidebarOpenTabsHost');
        if (!host) {
          host = document.createElement('div');
          host.id = 'sidebarOpenTabsHost';
          host.className = 'sidebar-open-tabs-host';
        }
        ensureOpenTabsHostLayout(host);
        return host;
      }

      function appendSidebarTreeToolbar(nav) {
        var toolbar = document.createElement('div');
        toolbar.className = 'sidebar-tree-toolbar';
        var toggleAll = document.createElement('button');
        toggleAll.type = 'button';
        toggleAll.className = 'sidebar-tree-toggle-all';
        toggleAll.id = 'sidebarToggleAll';
        toggleAll.setAttribute('aria-label', '사이드바 그룹 전체 펼치기 또는 접기');
        toggleAll.textContent = '전체 펼치기';
        toggleAll.addEventListener('click', function () {
          var nodes = nav.querySelectorAll('.sidebar-tree-node');
          var allExpanded = nodes.length && Array.from(nodes).every(function (n) {
            return !n.classList.contains('is-collapsed');
          });
          var expand = !allExpanded;
          nodes.forEach(function (n) {
            n.classList.toggle('is-collapsed', !expand);
            var h = n.querySelector('.sidebar-group-toggle');
            if (h) h.setAttribute('aria-expanded', expand ? 'true' : 'false');
          });
          if (expand && activeId) expandSidebarGroupForActiveDoc(nav, activeId);
          syncSidebarToggleAllLabel(nav);
        });
        toolbar.appendChild(toggleAll);
        nav.appendChild(toolbar);
      }

      function appendTreeNodeForBucket(nav, bucket, startCollapsed) {
        var node = document.createElement('div');
        node.className = 'sidebar-tree-node' + (startCollapsed ? ' is-collapsed' : '');
        node.setAttribute('data-sidebar-bucket', bucket.key);
        var head = document.createElement('button');
        head.type = 'button';
        head.className = 'sidebar-group-toggle';
        head.setAttribute('aria-expanded', startCollapsed ? 'false' : 'true');
        head.innerHTML =
          '<span class="sidebar-caret" aria-hidden="true">▼</span><span>' +
          escapeHtml(bucket.label) +
          '</span>';
        var children = document.createElement('div');
        children.className = 'sidebar-tree-children';
        bucket.items.forEach(function (d) {
          var b = document.createElement('button');
          b.type = 'button';
          b.setAttribute('data-doc', d.id);
          b.title = 'Ctrl+클릭: 순수 파일 URL 새 창';
          b.innerHTML = escapeHtml(d.label);
          b.addEventListener('click', function (e) {
            if (e.ctrlKey || e.metaKey) {
              e.preventDefault();
              openDocStandalonePopout(d.id);
              return;
            }
            openTab(d.id);
          });
          children.appendChild(b);
        });
        head.addEventListener('click', function (e) {
          e.preventDefault();
          node.classList.toggle('is-collapsed');
          var collapsed = node.classList.contains('is-collapsed');
          head.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
          syncSidebarToggleAllLabel(nav);
        });
        node.appendChild(head);
        node.appendChild(children);
        nav.appendChild(node);
      }

      function createSidebarDocButton(d) {
        var b = document.createElement('button');
        b.type = 'button';
        b.setAttribute('data-doc', d.id);
        b.title = 'Ctrl+클릭: 순수 파일 URL 새 창';
        b.innerHTML = escapeHtml(d.label);
        b.addEventListener('click', function (e) {
          if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            openDocStandalonePopout(d.id);
            return;
          }
          openTab(d.id);
        });
        return b;
      }

      /** treeKey 예: `docs`, `페이지` — 하위는 `treeKey/page01` 또는 `treeKey/page01/page0100` (중첩 폴더) */
      function appendGroupedTree(nav, rootBucket, subBuckets, treeKey, titleText) {
        var prefix = treeKey + '/';
        var outer = document.createElement('div');
        outer.className = 'sidebar-tree-node is-collapsed';
        outer.setAttribute('data-sidebar-bucket', treeKey);
        var head = document.createElement('button');
        head.type = 'button';
        head.className = 'sidebar-group-toggle';
        head.setAttribute('aria-expanded', 'false');
        head.innerHTML =
          '<span class="sidebar-caret" aria-hidden="true">▼</span><span>' + escapeHtml(titleText) + '</span>';
        var children = document.createElement('div');
        children.className = 'sidebar-tree-children';

        if (rootBucket && rootBucket.items && rootBucket.items.length) {
          rootBucket.items.forEach(function (d) {
            children.appendChild(createSidebarDocButton(d));
          });
        }

        var groupedByTop = {};
        subBuckets.forEach(function (sb) {
          var rest = sb.key.indexOf(prefix) === 0 ? sb.key.slice(prefix.length) : sb.key;
          var parts = rest.split('/').filter(function (p) {
            return p.length > 0;
          });
          if (!parts.length) return;
          var top = parts[0];
          if (!groupedByTop[top]) groupedByTop[top] = { shallow: null, deep: [] };
          if (parts.length === 1) {
            groupedByTop[top].shallow = sb;
          } else {
            groupedByTop[top].deep.push({
              subPath: parts.slice(1).join('/'),
              bucket: sb
            });
          }
        });

        var topKeys = Object.keys(groupedByTop).sort(function (a, b) {
          return a.localeCompare(b, 'en', { numeric: true, sensitivity: 'base' });
        });

        function bindNestedToggle(subNode, subHead, navRef) {
          subHead.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            subNode.classList.toggle('is-collapsed');
            var collapsed = subNode.classList.contains('is-collapsed');
            subHead.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
            syncSidebarToggleAllLabel(navRef);
          });
        }

        topKeys.forEach(function (top) {
          var g = groupedByTop[top];
          var subNode = document.createElement('div');
          subNode.className = 'sidebar-tree-node sidebar-tree-node--nested is-collapsed';
          subNode.setAttribute('data-sidebar-bucket', prefix + top);
          var subHead = document.createElement('button');
          subHead.type = 'button';
          subHead.className = 'sidebar-group-toggle';
          subHead.setAttribute('aria-expanded', 'false');
          subHead.innerHTML =
            '<span class="sidebar-caret" aria-hidden="true">▼</span><span>' + escapeHtml(top) + '</span>';
          var subChildren = document.createElement('div');
          subChildren.className = 'sidebar-tree-children';

          if (g.shallow && g.shallow.items && g.shallow.items.length) {
            g.shallow.items.forEach(function (d) {
              subChildren.appendChild(createSidebarDocButton(d));
            });
          }

          g.deep.sort(function (a, b) {
            return a.subPath.localeCompare(b.subPath, 'en', { numeric: true, sensitivity: 'base' });
          });
          g.deep.forEach(function (deepEnt) {
            var innerNode = document.createElement('div');
            innerNode.className = 'sidebar-tree-node sidebar-tree-node--nested is-collapsed';
            innerNode.setAttribute('data-sidebar-bucket', prefix + top + '/' + deepEnt.subPath);
            var innerHead = document.createElement('button');
            innerHead.type = 'button';
            innerHead.className = 'sidebar-group-toggle';
            innerHead.setAttribute('aria-expanded', 'false');
            innerHead.innerHTML =
              '<span class="sidebar-caret" aria-hidden="true">▼</span><span>' +
              escapeHtml(deepEnt.subPath) +
              '</span>';
            var innerCh = document.createElement('div');
            innerCh.className = 'sidebar-tree-children';
            deepEnt.bucket.items.forEach(function (d) {
              innerCh.appendChild(createSidebarDocButton(d));
            });
            bindNestedToggle(innerNode, innerHead, nav);
            innerNode.appendChild(innerHead);
            innerNode.appendChild(innerCh);
            subChildren.appendChild(innerNode);
          });

          bindNestedToggle(subNode, subHead, nav);
          subNode.appendChild(subHead);
          subNode.appendChild(subChildren);
          children.appendChild(subNode);
        });

        head.addEventListener('click', function (e) {
          e.preventDefault();
          outer.classList.toggle('is-collapsed');
          var collapsed = outer.classList.contains('is-collapsed');
          head.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
          syncSidebarToggleAllLabel(nav);
        });
        outer.appendChild(head);
        outer.appendChild(children);
        nav.appendChild(outer);
      }

      function buildMainSidebarBucketsForApp(appKey) {
        var buckets = [];
        var keyToIndex = {};
        DOCS.forEach(function (d) {
          if (d.hideFromSidebar) return;
          var app = d.app || HOME_APP_KEY;
          if (app !== appKey) return;
          var key = d.group == null || d.group === '' ? '__none__' : d.group;
          if (keyToIndex[key] === undefined) {
            keyToIndex[key] = buckets.length;
            buckets.push({
              key: key,
              label: d.group == null || d.group === '' ? '일반' : d.group,
              items: [],
              sortRank: d.groupOrder != null ? d.groupOrder : 100
            });
          } else {
            var bi = keyToIndex[key];
            if (d.groupOrder != null && (buckets[bi].sortRank == null || d.groupOrder < buckets[bi].sortRank)) {
              buckets[bi].sortRank = d.groupOrder;
            }
          }
          buckets[keyToIndex[key]].items.push(d);
        });
        buckets.sort(function (a, b) {
          if (a.key === '__none__') return -1;
          if (b.key === '__none__') return 1;
          var ra = a.sortRank != null ? a.sortRank : 100;
          var rb = b.sortRank != null ? b.sortRank : 100;
          if (ra !== rb) return ra - rb;
          return a.label.localeCompare(b.label, 'ko', { numeric: true, sensitivity: 'base' });
        });
        return buckets;
      }

      /** 표시 문자열 기준으로 어두운 톤 배경색 (동일 텍스트 → 동일 색) */
      function sidebarBgFromLabelText(label) {
        var t = String(label || '');
        var h = 5381;
        for (var i = 0; i < t.length; i++) {
          h = ((h << 5) + h) + t.charCodeAt(i);
          h |= 0;
        }
        var hue = Math.abs(h) % 360;
        var s = 20 + (Math.abs(h >> 5) % 28);
        var l = 10 + (Math.abs(h >> 11) % 9);
        return 'hsl(' + hue + ', ' + s + '%, ' + l + '%)';
      }

      function applySidebarAppTitle(secEl, displayLabel) {
        if (!secEl) return;
        secEl.className = 'sidebar-section sidebar-app-title';
        secEl.id = 'sidebarAppTitle';
        secEl.textContent = displayLabel;
        secEl.style.background = sidebarBgFromLabelText(displayLabel);
        secEl.style.color = '#facc15';
      }

      function buildTempSidebar() {
        var nav = document.getElementById('sidebar');
        var host = getSidebarOpenTabHost();
        while (nav.firstChild) nav.removeChild(nav.firstChild);
        var sec = document.createElement('div');
        applySidebarAppTitle(sec, '임시 메뉴');
        nav.appendChild(sec);
        nav.appendChild(host);
        appendSidebarTreeToolbar(nav);
        var items = [];
        ['tmp1', 'tmp2'].forEach(function (tid) {
          var d = findDoc(tid);
          if (d) items.push(d);
        });
        appendTreeNodeForBucket(nav, { key: 'temp', label: '항목', items: items }, true);
        syncSidebarToggleAllLabel(nav);
        expandSidebarGroupForActiveDoc(nav, activeId);
      }

      function buildSidebarForApp(appKey) {
        var nav = document.getElementById('sidebar');
        var host = getSidebarOpenTabHost();
        while (nav.firstChild) nav.removeChild(nav.firstChild);
        var sec = document.createElement('div');
        var uiHome = (window.MAIN_FRAME_UI || {}).sidebarHomeAppTitle || '문서';
        var titleLabel = appKey === HOME_APP_KEY ? uiHome : appKey;
        applySidebarAppTitle(sec, titleLabel);
        nav.appendChild(sec);
        nav.appendChild(host);
        appendSidebarTreeToolbar(nav);
        var buckets = buildMainSidebarBucketsForApp(appKey);
        if (appKey === HOME_APP_KEY || appKey === 'modunuri_v260329' || appKey === 'partyroom_v260329' || appKey === 'docs_v260329' || appKey === 'anynuri_v260329' || appKey === 'datavisual_v260406' || appKey === 'dangoeul_v260330' || appKey === 'artLeaseSale_v260330' || appKey === 'shopjoy_v260406') {
          var pageRootBucket2 = null;
          var pageSubBuckets2 = [];
          buckets.forEach(function (b) {
            if (b.key === '페이지') pageRootBucket2 = b;
            else if (b.key.indexOf('페이지/') === 0) pageSubBuckets2.push(b);
          });
          pageSubBuckets2.sort(function (a, b) {
            return a.key.localeCompare(b.key, 'en', { numeric: true, sensitivity: 'base' });
          });
          buckets.forEach(function (bucket) {
            if (bucket.key === '페이지' || bucket.key.indexOf('페이지/') === 0) return;
            appendTreeNodeForBucket(nav, bucket, true);
          });
          if (pageRootBucket2 || pageSubBuckets2.length) {
            appendGroupedTree(nav, pageRootBucket2, pageSubBuckets2, '페이지', '페이지');
          }
        } else {
          buckets.forEach(function (bucket) {
            appendTreeNodeForBucket(nav, bucket, true);
          });
        }
        syncSidebarToggleAllLabel(nav);
        expandSidebarGroupForActiveDoc(nav, activeId);
      }

      function buildSidebar() {
        buildSidebarForApp(DEFAULT_MODE);
      }

      function fromHash() {
        var h = normalizeDocHash((location.hash || '').replace(/^#/, ''));
        if (h && findDoc(h)) openTab(h);
        else openTab('hm_index');
      }

      window.addEventListener('hashchange', function () {
        var h = normalizeDocHash((location.hash || '').replace(/^#/, ''));
        if (h && findDoc(h)) {
          openTab(h);
        }
      });

      try {
        openTabListPinned = localStorage.getItem('intSmsMdOpenTabListPinned') === '1';
        var sm = localStorage.getItem('intSmsMdOpenTabSort');
        if (sm === 'tabs' || sm === 'alpha') openTabListSortMode = sm;
      } catch (e) {}

      buildSidebar();
      initSidebarToggle();
      initTopNav();
      initTopNavOpenSite();
      initTopNavSearch();
      initSidebarSiteNav();
      initSidebarUsefulSites();
      initTabScrollControls();
      initOpenTabSelect();
      initTabContextMenu();
      initTabKeyboardNav();
      tryConsumeEmbedLegacyParam();
      var twPayload = tryConsumeNewWindowTabs();
      tryConsumePopParam();
      if (twPayload) {
        applyTabRestorePayload(twPayload);
      } else {
        fromHash();
        applyOpenTabListPinnedState();
        syncOpenTabSortButtons();
      }

      try {
        if (document.documentElement.classList.contains('embed-view')) {
          sessionStorage.setItem('intSmsMdStandalone', '1');
        } else {
          sessionStorage.removeItem('intSmsMdStandalone');
        }
      } catch (e) {}
    })();
  </script>
